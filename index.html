<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSE 446 · Study</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --brand: #4255ff; --brand-hover: #3847e0; --brand-light: #edefff; --brand-glow: rgba(66,85,255,.12);
  --bg: #f6f7fb; --white: #fff; --card: #fff;
  --text: #282e3e; --text2: #586380; --text3: #939bb4;
  --border: #e5e7eb; --border2: #d1d5db;
  --green: #23b26d; --green-bg: #dbf5e7; --red: #e04040; --red-bg: #fde8e8;
  --amber: #f0a000; --amber-bg: #fff4d6;
  --shadow-1: 0 2px 8px rgba(0,0,0,.04); --shadow-2: 0 4px 16px rgba(0,0,0,.07); --shadow-3: 0 8px 30px rgba(0,0,0,.10);
  --r-sm: 8px; --r-md: 12px; --r-lg: 16px; --r-xl: 20px; --r-full: 999px;
  --font: 'Nunito', -apple-system, system-ui, sans-serif; --mono: 'JetBrains Mono', monospace;
  --ease: cubic-bezier(.4,0,.2,1); --nav-h: 64px;
}
[data-theme="dark"] {
  --bg: #0f1120; --white: #181b2e; --card: #1c2035;
  --text: #e4e7f0; --text2: #8b92b0; --text3: #585f7a;
  --border: rgba(255,255,255,.08); --border2: rgba(255,255,255,.12);
  --brand-light: rgba(66,85,255,.15); --brand-glow: rgba(66,85,255,.2);
  --green-bg: rgba(35,178,109,.12); --red-bg: rgba(224,64,64,.12); --amber-bg: rgba(240,160,0,.12);
  --shadow-1: 0 2px 8px rgba(0,0,0,.2); --shadow-2: 0 4px 16px rgba(0,0,0,.25); --shadow-3: 0 8px 30px rgba(0,0,0,.35);
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { font-family:var(--font); background:var(--bg); color:var(--text); line-height:1.65; font-size:15px; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; min-height:100vh; transition:background .3s var(--ease), color .3s var(--ease); }
::selection { background:var(--brand); color:#fff; }
::-webkit-scrollbar { width:8px; } ::-webkit-scrollbar-track { background:transparent; } ::-webkit-scrollbar-thumb { background:var(--border2); border-radius:8px; } ::-webkit-scrollbar-thumb:hover { background:var(--text3); }
button { cursor:pointer; font-family:inherit; border:none; background:none; color:inherit; }
a { color:var(--brand); text-decoration:none; }
code, pre { font-family:var(--mono); }
img { display:block; max-width:100%; }

/* NAV */
.nav { position:sticky; top:0; z-index:100; background:var(--white); border-bottom:1px solid var(--border); backdrop-filter:blur(20px) saturate(1.2); transition:background .3s var(--ease), border-color .3s var(--ease); }
[data-theme="dark"] .nav { background:rgba(24,27,46,.85); }
.nav-inner { max-width:1200px; margin:0 auto; height:var(--nav-h); display:flex; align-items:center; justify-content:space-between; padding:0 24px; }
.nav-logo { font-size:20px; font-weight:800; color:var(--brand); letter-spacing:-.03em; display:flex; align-items:center; gap:6px; }
.nav-logo .dot { width:8px; height:8px; background:var(--brand); border-radius:50%; display:inline-block; }
.nav-tabs { display:flex; gap:4px; }
.nav-tab { padding:8px 16px; font-size:14px; font-weight:600; color:var(--text2); border-radius:var(--r-full); transition:all .2s var(--ease); }
.nav-tab:hover { background:var(--brand-light); color:var(--brand); }
.nav-tab.active { background:var(--brand); color:#fff; box-shadow:0 2px 10px rgba(66,85,255,.3); }
.nav-right { display:flex; align-items:center; gap:8px; }
.nav-btn { width:38px; height:38px; border-radius:var(--r-md); display:flex; align-items:center; justify-content:center; font-size:18px; color:var(--text2); transition:all .2s var(--ease); }
.nav-btn:hover { background:var(--brand-light); color:var(--brand); }

/* LAYOUT */
.container { max-width:880px; margin:0 auto; padding:32px 24px 80px; }
.page { display:none; } .page.active { display:block; }

/* HEADINGS */
h1 { font-size:32px; font-weight:800; letter-spacing:-.03em; line-height:1.2; margin-bottom:8px; }
h2 { font-size:24px; font-weight:800; letter-spacing:-.02em; line-height:1.3; margin-bottom:16px; }
h3 { font-size:17px; font-weight:700; color:var(--brand); margin:24px 0 8px; }
h3:first-child { margin-top:0; }

/* BUTTONS */
.btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; font-weight:700; border-radius:var(--r-full); transition:all .2s var(--ease); line-height:1; }
.btn-lg { padding:14px 32px; font-size:16px; }
.btn-md { padding:10px 24px; font-size:14px; }
.btn-sm { padding:7px 16px; font-size:13px; }
.btn-brand { background:var(--brand); color:#fff; box-shadow:0 2px 10px rgba(66,85,255,.25); }
.btn-brand:hover { background:var(--brand-hover); transform:translateY(-1px); box-shadow:0 4px 16px rgba(66,85,255,.35); }
.btn-outline { background:transparent; border:2px solid var(--border2); color:var(--text); }
.btn-outline:hover { border-color:var(--brand); color:var(--brand); background:var(--brand-light); }
.btn-ghost { background:var(--bg); color:var(--text2); }
.btn-ghost:hover { background:var(--brand-light); color:var(--brand); }
.btn-green { background:var(--green); color:#fff; }
.btn-red { background:var(--red); color:#fff; }
.btn:active { transform:translateY(0) scale(.98); }
.btn:disabled { opacity:.4; pointer-events:none; }

/* CARDS */
.card { background:var(--card); border:1px solid var(--border); border-radius:var(--r-xl); padding:28px; box-shadow:var(--shadow-1); transition:all .25s var(--ease); }
.card:hover { box-shadow:var(--shadow-2); }
.card p { margin-bottom:8px; line-height:1.75; }
.card ul, .card ol { margin:8px 0 12px; padding-left:22px; }
.card li { padding:3px 0; line-height:1.7; }
.card strong { font-weight:700; }

/* HOME HERO */
.hero { text-align:center; padding:48px 0 32px; }
.hero h1 { font-size:40px; margin-bottom:12px; }
.hero p { font-size:18px; color:var(--text2); max-width:520px; margin:0 auto 28px; }
.feature-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; margin:32px 0; }
.feature-card { border-radius:var(--r-xl); padding:28px 24px; text-align:left; cursor:pointer; transition:all .25s var(--ease); border:none; position:relative; overflow:hidden; }
.feature-card:hover { transform:translateY(-4px); box-shadow:var(--shadow-3); }
.feature-card h3 { color:inherit; margin:0 0 6px; font-size:18px; }
.feature-card p { font-size:13px; opacity:.8; margin:0; line-height:1.5; }
.fc-purple { background:linear-gradient(135deg,#4255ff,#6b7aff); color:#fff; }
.fc-coral { background:linear-gradient(135deg,#ff8a65,#ff6b6b); color:#fff; }
.fc-teal { background:linear-gradient(135deg,#26c6da,#00bcd4); color:#fff; }
.fc-amber { background:linear-gradient(135deg,#ffb74d,#ffa726); color:#fff; }
.fc-green { background:linear-gradient(135deg,#4caf50,#66bb6a); color:#fff; }

/* STAT GRID */
.stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:14px; margin:24px 0; }
.stat-box { background:var(--card); border:1px solid var(--border); border-radius:var(--r-lg); padding:20px; text-align:center; }
.stat-num { font-size:36px; font-weight:800; color:var(--brand); letter-spacing:-.03em; line-height:1.1; }
.stat-lbl { font-size:12px; font-weight:600; color:var(--text3); text-transform:uppercase; letter-spacing:.5px; margin-top:4px; }

/* PROGRESS */
.prog { height:6px; background:var(--bg); border-radius:var(--r-full); overflow:hidden; }
.prog-fill { height:100%; background:var(--brand); border-radius:var(--r-full); transition:width .5s var(--ease); }
.mastery { display:flex; align-items:center; gap:12px; padding:10px 0; }
.mastery-name { flex:1; font-size:14px; font-weight:600; }
.mastery-bar { flex:2; }
.mastery-val { width:44px; text-align:right; font-size:14px; font-weight:800; font-variant-numeric:tabular-nums; }

/* CHIPS */
.chips { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px; }
.chip { padding:8px 18px; border-radius:var(--r-full); font-size:13px; font-weight:700; border:2px solid var(--border); background:var(--card); transition:all .2s var(--ease); }
.chip:hover { border-color:var(--brand); color:var(--brand); }
.chip.on { background:var(--brand); color:#fff; border-color:var(--brand); box-shadow:0 2px 10px rgba(66,85,255,.25); }

/* FLASHCARD */
.fc-area { display:flex; flex-direction:column; align-items:center; padding:20px 0; }
.fc-counter { font-size:14px; font-weight:600; color:var(--text3); margin-bottom:16px; }
.fc-card { width:100%; max-width:640px; height:320px; perspective:1200px; cursor:pointer; margin-bottom:20px; }
.fc-inner { position:relative; width:100%; height:100%; transition:transform .5s var(--ease); transform-style:preserve-3d; }
.fc-card.flip .fc-inner { transform:rotateY(180deg); }
.fc-face { position:absolute; inset:0; backface-visibility:hidden; border-radius:var(--r-xl); display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:40px 36px; }
.fc-front { background:var(--card); border:2px solid var(--border); box-shadow:var(--shadow-2); }
.fc-back { background:linear-gradient(135deg,#4255ff,#6b7aff); color:#fff; transform:rotateY(180deg); box-shadow:0 8px 32px rgba(66,85,255,.25); }
.fc-hint { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; color:var(--text3); margin-bottom:20px; }
.fc-back .fc-hint { color:rgba(255,255,255,.5); }
.fc-text { font-size:20px; font-weight:700; line-height:1.5; }
.fc-back .fc-text { font-size:17px; font-weight:600; }
.fc-btns { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }

/* QUIZ */
.q-card { background:var(--card); border:1px solid var(--border); border-radius:var(--r-xl); padding:32px; margin-bottom:20px; box-shadow:var(--shadow-1); }
.q-text { font-size:18px; font-weight:700; margin-bottom:20px; line-height:1.5; }
.q-opt { display:block; width:100%; text-align:left; padding:14px 18px; margin:8px 0; border-radius:var(--r-lg); border:2px solid var(--border); background:var(--card); font-size:15px; font-weight:600; transition:all .2s var(--ease); line-height:1.5; }
.q-opt:hover { border-color:var(--brand); background:var(--brand-light); transform:translateX(4px); }
.q-opt.sel { border-color:var(--brand); background:var(--brand-light); }
.q-opt.ok { border-color:var(--green); background:var(--green-bg); color:var(--green); }
.q-opt.no { border-color:var(--red); background:var(--red-bg); color:var(--red); }
.q-exp { margin-top:16px; padding:16px 18px; background:var(--bg); border-radius:var(--r-md); font-size:14px; line-height:1.7; border-left:3px solid var(--brand); }
.q-big { font-size:64px; font-weight:800; color:var(--brand); text-align:center; letter-spacing:-.04em; }
.q-sub { text-align:center; color:var(--text2); font-size:16px; margin-bottom:24px; }

/* MOCK TIMER */
.timer { position:sticky; top:var(--nav-h); z-index:10; background:var(--white); border-bottom:1px solid var(--border); padding:12px 24px; display:flex; align-items:center; justify-content:space-between; backdrop-filter:blur(16px); }
[data-theme="dark"] .timer { background:rgba(24,27,46,.92); }
.timer-clock { font-size:28px; font-weight:800; font-variant-numeric:tabular-nums; letter-spacing:-.02em; }
.timer-clock.warn { color:var(--amber); }
.timer-clock.crit { color:var(--red); }
.timer-dots { display:flex; flex-wrap:wrap; gap:4px; justify-content:center; margin-top:12px; }
.timer-dot { width:10px; height:10px; border-radius:50%; cursor:pointer; transition:all .15s var(--ease); }

/* CODE & CALLOUT */
pre.code { background:var(--bg); border:1px solid var(--border); border-radius:var(--r-md); padding:18px 20px; overflow-x:auto; font-size:13px; line-height:1.8; margin:12px 0; white-space:pre-wrap; color:var(--text2); }
[data-theme="dark"] pre.code { background:#0c0e18; }
.callout { border-radius:0 var(--r-md) var(--r-md) 0; padding:14px 18px; margin:14px 0; font-size:14px; line-height:1.7; }
.callout-label { font-size:10px; font-weight:800; letter-spacing:1px; margin-bottom:4px; text-transform:uppercase; }
.callout-info { background:var(--brand-light); border-left:3px solid var(--brand); }
.callout-info .callout-label { color:var(--brand); }
.callout-warn { background:var(--red-bg); border-left:3px solid var(--red); }
.callout-warn .callout-label { color:var(--red); }

/* TABLE */
.tbl { width:100%; border-collapse:separate; border-spacing:0; margin:12px 0; font-size:13px; border-radius:var(--r-md); overflow:hidden; border:1px solid var(--border); }
.tbl th { background:var(--bg); padding:10px 14px; text-align:left; font-weight:700; font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:var(--text2); border-bottom:1px solid var(--border); }
.tbl th+th,.tbl td+td { border-left:1px solid var(--border); }
.tbl td { padding:9px 14px; border-bottom:1px solid var(--border); line-height:1.6; }
.tbl tr:last-child td { border-bottom:none; }

.diagram { background:var(--bg); border:1px solid var(--border); border-radius:var(--r-md); padding:16px 18px; overflow-x:auto; font-family:var(--mono); font-size:12.5px; line-height:1.5; margin:12px 0; white-space:pre; color:var(--brand); }
[data-theme="dark"] .diagram { background:#0c0e18; }

/* BANNER */
.banner { background:var(--brand-light); border:1px solid rgba(66,85,255,.1); border-radius:var(--r-xl); padding:24px; margin-bottom:24px; }
.banner h3 { color:var(--brand); margin:0 0 6px; font-size:16px; }
.banner p { font-size:14px; color:var(--text2); margin-bottom:0; }
.banner-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:10px; margin-top:16px; }
.banner-item { text-align:center; padding:14px 8px; background:var(--card); border-radius:var(--r-md); border:1px solid var(--border); }
.banner-num { font-size:22px; font-weight:800; color:var(--brand); }
.banner-lbl { font-size:11px; color:var(--text3); margin-top:2px; }

.fade { animation:fadeUp .3s var(--ease) both; }
@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

@media(max-width:640px) {
  h1 { font-size:28px; } .hero h1 { font-size:32px; }
  .nav-tabs { display:none; } .nav-mobile { display:flex !important; }
  .feature-grid { grid-template-columns:1fr 1fr; }
  .stats { grid-template-columns:1fr 1fr; }
  .fc-card { height:260px; }
  .container { padding:24px 16px 60px; }
}
.nav-mobile { display:none; gap:4px; overflow-x:auto; padding:8px 24px; background:var(--white); border-bottom:1px solid var(--border); }
[data-theme="dark"] .nav-mobile { background:var(--white); }
.nav-mobile .nav-tab { white-space:nowrap; font-size:13px; padding:6px 14px; }
</style>
</head>

<script>
const T=[{id:'pca',s:'PCA',f:'Principal Component Analysis'},{id:'kmeans',s:'K-Means',f:'K-Means Clustering'},{id:'hierarchical',s:'Hierarchical',f:'Hierarchical Clustering'},{id:'nn',s:'Neural Nets',f:'Neural Networks'},{id:'svm',s:'SVM',f:'Support Vector Machines'}];

const G={pca:`<h2>Principal Component Analysis</h2><h3>What is PCA?</h3><p><strong>Dimensionality reduction</strong> that finds <strong>linear combinations</strong> with <strong>maximal variance</strong>, mutually uncorrelated.</p><div class="callout callout-info"><div class="callout-label">Exam Point</div>PCA = max variance directions. Clustering = homogeneous subgroups.</div><h3>First PC</h3><pre class="code">Z₁ = φ₁₁X₁ + φ₂₁X₂ + ... + φₚ₁Xₚ    subject to: Σφⱼ₁² = 1</pre><ul><li>PC2 maximizes variance <strong>orthogonal to PC1</strong></li><li>Max PCs = <strong>min(n−1, p)</strong></li></ul><div class="diagram">     PC2
      ↑     · ·
      |   ·  ╱  ·       PC1 ──→
      |  · ╱     ·
      | ·╱    ·
──────┼──────────→</div><h3>5 Steps</h3><ol><li><strong>Standardize</strong></li><li><strong>Covariance matrix</strong></li><li><strong>Eigenvalues/vectors</strong></li><li><strong>Choose # PCs</strong> (scree plot elbow)</li><li><strong>Project data</strong></li></ol><h3>PVE</h3><pre class="code">PVEₘ = λₘ / Σλⱼ    (all sum to 1)</pre><h3>Worked Example</h3><pre class="code">Data: (2,3), (3,4), (4,5)
Center: (-1,-1), (0,0), (1,1)
Σ = [[2/3, 2/3], [2/3, 2/3]]
λ₁ = 4/3, λ₂ = 0 → PVE₁ = 100%
φ₁ = (1/√2, 1/√2)</pre><h3>Example 2</h3><pre class="code">λ₁=5.5, λ₂=1.2, λ₃=0.3 → Total=7.0
PVE₁=78.6%, PVE₂=17.1%, PVE₃=4.3%
Cumulative(1+2)=95.7% → retain 2</pre><h3>Python</h3><pre class="code">from sklearn.preprocessing import StandardScaler
from sklearn.decomposition import PCA
X_s = StandardScaler().fit_transform(X)
pca = PCA(n_components=2).fit(X_s)
pca.explained_variance_ratio_</pre><div class="callout callout-warn"><div class="callout-label">Watch Out</div>Always standardize. Different scales → different PCs.</div>`,
kmeans:`<h2>K-Means Clustering</h2><h3>Idea</h3><p>Partition n observations into K clusters minimizing <strong>within-cluster variation</strong>.</p><pre class="code">min Σₖ WCV(Cₖ) = Σₖ (1/|Cₖ|) Σ ||xᵢ−xᵢ'||²</pre><h3>Algorithm</h3><ol><li>Randomly assign to K clusters</li><li>Compute centroids (feature means)</li><li>Reassign to nearest centroid</li><li>Repeat until convergence</li></ol><div class="callout callout-info"><div class="callout-label">Exam Point</div>Guaranteed to decrease objective. NOT global minimum. Multiple random starts.</div><h3>Worked Example</h3><pre class="code">A(1,1), B(1.5,2), C(3,4), D(5,7)  K=2
C₁={A,B} → μ₁=(1.25,1.5)
C₂={C,D} → μ₂=(4,5.5)
Reassign: all stay → converged!
WCV = 0.625 + 6.5 = 7.125</pre>`,
hierarchical:`<h2>Hierarchical Clustering</h2><h3>Advantage</h3><p><strong>No K needed.</strong> Dendrogram lets you choose after.</p><ol><li>Each obs = cluster</li><li>Merge closest pair</li><li>Repeat</li></ol><div class="diagram">  Height
  11.31 |     _____|_____
        |    |           |
   1.41 |  ___|___   ___|___
        | |       | |       |
        | A       B C       D</div><h3>Linkage</h3><table class="tbl"><tr><th>Type</th><th>Measure</th><th>Result</th></tr><tr><td>Single</td><td>Min distance</td><td>Chains</td></tr><tr><td>Complete</td><td>Max distance</td><td>Compact</td></tr><tr><td>Average</td><td>Mean pairs</td><td>Balanced</td></tr><tr><td>Ward</td><td>Min variance↑</td><td>K-means-like</td></tr></table><h3>Worked Example</h3><pre class="code">A(1,1) B(2,2) C(8,8) D(9,9)
d(A,B)=d(C,D)=√2≈1.41
Complete: {A,B}↔{C,D} at max=11.31
Cut h=5 → 2 clusters</pre><h3>vs K-Means</h3><table class="tbl"><tr><th></th><th>K-Means</th><th>Hierarchical</th></tr><tr><td>K</td><td>Required</td><td>Choose after</td></tr><tr><td>Deterministic</td><td>No</td><td>Yes</td></tr><tr><td>Scale</td><td>Good</td><td>O(n²+)</td></tr></table>`,
nn:`<h2>Neural Networks</h2><div class="diagram">  Input    Hidden     Output
   x₁ ──╲    h₁ ╲
          ╲╱      ╲
   x₂ ────╳── h₂ ──╳── ŷ
          ╱╲      ╱
   x₃ ──╱    h₃ ╱
  Neuron: g(Σwᵢxᵢ + b)</div><h3>Activations</h3><table class="tbl"><tr><th>Function</th><th>Range</th><th>Use</th><th>Issue</th></tr><tr><td><strong>Sigmoid</strong> 1/(1+e⁻ᶻ)</td><td>(0,1)</td><td>Binary out</td><td>Vanishing</td></tr><tr><td><strong>Tanh</strong></td><td>(−1,1)</td><td>Hidden</td><td>Vanishing</td></tr><tr><td><strong>ReLU</strong> max(0,z)</td><td>[0,∞)</td><td>Hidden★</td><td>Dying</td></tr><tr><td><strong>Leaky</strong> max(.1z,z)</td><td>(−∞,∞)</td><td>Hidden</td><td>—</td></tr><tr><td><strong>Softmax</strong></td><td>Σ=1</td><td>Multi-class</td><td>—</td></tr></table><h3>Forward Prop</h3><pre class="code">z = Σwᵢxᵢ + b → output = g(z)</pre><h3>Backprop</h3><pre class="code">∂L/∂w = ∂L/∂ŷ · ∂ŷ/∂z · ∂z/∂w
w ← w − η · ∂L/∂w</pre><h3>Worked Example</h3><pre class="code">x₁=1, x₂=2  |  w₁₁=.5, w₁₂=−.5, w₂₁=.3, w₂₂=.8

function nQ(){S.qi++;S.qa=false;S.qs=-1;if(S.qi>=QZ[S.qt].length){S.qd=true;rqs(S.qt,S.qsc,S.qtl);cqz();}else sqz();render();}

function rMock(){if(S.me===-1){const p=gp();return`<div class="fade"><h2>Mock Exam</h2><div class="banner"><h3>Timed Simulation</h3><p>24 MCQs from all topics. Matches Part I format.</p></div>${MK.map((ex,i)=>{const tk=p.ms.filter(m=>m.e===i);const b=tk.length?Math.max(...tk.map(m=>Math.round(m.s/m.t*100))):null;return`<div class="card" style="cursor:pointer" onclick="stM(${i})"><div style="display:flex;justify-content:space-between;align-items:center"><div><h3 style="margin:0">Mock Exam ${i+1}</h3><p style="color:var(--text3);margin:4px 0 0">${ex.length} questions</p></div><div style="text-align:right">${b!==null?`<div style="font-size:28px;font-weight:800;color:var(--brand)">${b}%</div><div style="font-size:12px;color:var(--text3)">${tk.length} attempt${tk.length>1?'s':''}</div>`:'<button class="btn btn-brand btn-sm">Start</button>'}</div></div></div>`;}).join('')}</div>`;}
const ex=MK[S.me];if(S.md){const sc=S.ma.reduce((s,a,i)=>s+(a===ex[i].a?1:0),0);const pc=Math.round(sc/ex.length*100);const bd={};ex.forEach((q,i)=>{if(!bd[q.t])bd[q.t]={c:0,t:0};bd[q.t].t++;if(S.ma[i]===q.a)bd[q.t].c++;});let bh='';Object.entries(bd).forEach(([tid,v])=>{const tn=T.find(t=>t.id===tid)?.f||tid;const p2=Math.round(v.c/v.t*100);const c=p2>=80?'var(--green)':p2>=50?'var(--amber)':'var(--red)';bh+=`<div class="mastery"><span class="mastery-name">${tn}</span><div class="mastery-bar"><div class="prog"><div class="prog-fill" style="width:${p2}%;background:${c}"></div></div></div><span class="mastery-val" style="color:${c}">${v.c}/${v.t}</span></div>`;});
let rv='';ex.forEach((q,i)=>{const ok=S.ma[i]===q.a;rv+=`<div style="padding:10px 0;border-bottom:1px solid var(--border)"><p style="font-weight:700;font-size:14px;${ok?'':'color:var(--red)'}">${i+1}. ${esc(q.q)}</p><p style="font-size:13px;color:var(--text2);margin-top:3px">You: <strong>${esc(q.o[S.ma[i]]||'—')}</strong> ${ok?'✓':'✗ → <strong>'+esc(q.o[q.a])+'</strong>'}</p></div>`;});
return`<div class="fade"><div class="q-card"><div class="q-big">${pc}%</div><div class="q-sub">${sc}/${ex.length} correct</div></div><div class="card"><h3 style="margin:0 0 8px">Breakdown</h3>${bh}</div><div class="card"><h3 style="margin:0 0 8px">Review</h3>${rv}</div><div style="text-align:center;margin-top:20px"><button class="btn btn-brand btn-md" onclick="S.me=-1;S.md=false;render()">← Back</button></div></div>`;}
const el=Math.floor((Date.now()-S.mt)/1000),mm=Math.floor(el/60),ss=el%60,ts=`${mm}:${ss<10?'0':''}${ss}`,tc=mm>=55?'crit':mm>=45?'warn':'',qn=ex[S.mi];
const opts=qn.o.map((o,i)=>`<button class="q-opt ${S.ma[S.mi]===i?'sel':''}" onclick="S.ma[${S.mi}]=${i};render()">${String.fromCharCode(65+i)}) ${esc(o)}</button>`).join('');
const dots=ex.map((_,i)=>`<span class="timer-dot" style="background:${i===S.mi?'var(--brand)':S.ma[i]!==undefined?'var(--green)':'var(--border2)'}" onclick="S.mi=${i};render()"></span>`).join('');
return`<div class="fade"><div class="timer"><span style="font-size:14px;font-weight:600;color:var(--text2)">Q${S.mi+1}/${ex.length}</span><span class="timer-clock ${tc}">${ts}</span><button class="btn btn-red btn-sm" onclick="fM()">Finish</button></div><div class="q-card"><div class="q-text">${esc(qn.q)}</div>${opts}<div style="display:flex;justify-content:space-between;margin-top:16px"><button class="btn btn-outline btn-sm" onclick="mN(-1)" ${S.mi===0?'disabled':''}>← Prev</button><button class="btn btn-brand btn-sm" onclick="mN(1)">${S.mi===ex.length-1?'Finish':'Next →'}</button></div></div><div class="timer-dots">${dots}</div></div>`;}
function stM(i){S.me=i;S.mi=0;S.ma=[];S.md=false;S.mt=Date.now();if(S.mti)clearInterval(S.mti);S.mti=setInterval(()=>{const e=document.querySelector('.timer-clock');if(!e)return;const s=Math.floor((Date.now()-S.mt)/1000),m=Math.floor(s/60),r=s%60;e.textContent=`${m}:${r<10?'0':''}${r}`;e.className='timer-clock'+(m>=55?' crit':m>=45?' warn':'');},1000);render();}
function mN(d){if(d===1&&S.mi===MK[S.me].length-1){fM();return;}S.mi=Math.max(0,Math.min(MK[S.me].length-1,S.mi+d));render();}
function fM(){if(S.mti){clearInterval(S.mti);S.mti=null;}S.md=true;const ex=MK[S.me],sc=S.ma.reduce((s,a,i)=>s+(a===ex[i].a?1:0),0),bd={};ex.forEach((q,i)=>{if(!bd[q.t])bd[q.t]={c:0,t:0};bd[q.t].t++;if(S.ma[i]===q.a)bd[q.t].c++;});rms(S.me,sc,ex.length,bd);render();}

(function(){const t=localStorage.getItem('mse446t');if(t==='dark'){document.documentElement.dataset.theme='dark';document.getElementById('themeBtn').textContent='☀';}us();nav('home');})();
</script>
