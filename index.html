<script>
const T=[{id:'pca',s:'PCA',f:'Principal Component Analysis'},{id:'kmeans',s:'K-Means',f:'K-Means Clustering'},{id:'hierarchical',s:'Hierarchical',f:'Hierarchical Clustering'},{id:'nn',s:'Neural Nets',f:'Neural Networks'},{id:'svm',s:'SVM',f:'Support Vector Machines'}];

const G={pca:`<h2>Principal Component Analysis (PCA)</h2>
<h3>Unsupervised Learning Context</h3>
<p>In <strong>supervised learning</strong>, we observe features X₁,...,Xₚ and a response Y, and the goal is prediction. In <strong>unsupervised learning</strong>, we only observe features — no response Y. PCA is an unsupervised method for <strong>data visualization</strong> and <strong>dimensionality reduction</strong>.</p>
<p>Two unsupervised methods in this course: (1) <strong>PCA</strong> — finds directions of maximum variance, and (2) <strong>Clustering</strong> — finds homogeneous subgroups.</p>
<div class="callout callout-info"><div class="callout-label">Exam Point</div>PCA looks for a low-dimensional representation that explains a good fraction of the <strong>variance</strong>. Clustering looks for <strong>homogeneous subgroups</strong>. Know the difference.</div>

<h3>What PCA Does</h3>
<p>PCA produces a low-dimensional representation of a dataset. It finds a sequence of <strong>linear combinations</strong> of the variables that have <strong>maximal variance</strong> and are <strong>mutually uncorrelated</strong>. When there are more than 3 features, we cannot visualize the data in all dimensions. PCA lets us choose 1, 2, or 3 dimensions that capture the most important information.</p>
<p>The idea: create new axes by linearly combining features. The more variance the new axis captures, the more separation of data is observed. PCA uses optimization to find the best linear combinations (called <strong>principal components</strong>) and projects the data onto them.</p>

<h3>First Principal Component — The Math</h3>
<pre class="code">The first PC of features X₁, X₂, ..., Xₚ is the normalized linear combination:

  Z₁ = φ₁₁X₁ + φ₂₁X₂ + ... + φₚ₁Xₚ

that has the LARGEST VARIANCE, subject to:

  Σⱼ₌₁ᵖ φⱼ₁² = 1    (normalization constraint)

• φ₁₁, ..., φₚ₁ are the LOADINGS of the first PC
• The loading vector is: φ₁ = (φ₁₁, φ₂₁, ..., φₚ₁)ᵀ
• Without the constraint, we could make variance
  arbitrarily large by scaling loadings up</pre>

<h3>Geometry of PCA</h3>
<p>The loading vector φ₁ defines a <strong>direction in feature space</strong> along which the data vary the most. If we project the n data points onto this direction, the projected values are the <strong>principal component scores</strong> z₁₁, ..., zₙ₁.</p>
<div class="diagram">     PC2 (less variance)
      ↑
      |     · ·
      |   ·  ╱  ·        PC1 direction (most variance)
      |  · ╱     ·       ──────→
      | ·╱    ·
      |╱ ·  ·
──────┼──────────→ X₁
      |
   The green line = PC1 direction
   The blue line = PC2 direction (perpendicular to PC1)
   Red dots = projections of data onto PC1</div>

<h3>Optimization Problem</h3>
<pre class="code">Assume data X is centered (column means = 0).

The first PC loading vector solves:

  max          (1/n) Σᵢ₌₁ⁿ (Σⱼ₌₁ᵖ φⱼ₁ xᵢⱼ)²
φ₁₁,...,φₚ₁

  subject to:  Σⱼ₌₁ᵖ φⱼ₁² = 1

Since each xᵢⱼ has mean zero, so does zᵢ₁.
The sample variance of zᵢ₁ is: (1/n) Σᵢ₌₁ⁿ zᵢ₁²

This is solved via singular-value decomposition (SVD)
of the matrix X — a standard linear algebra technique.</pre>

<h3>Further Principal Components</h3>
<p>The <strong>second PC</strong> is the linear combination of X₁,...,Xₚ that has maximal variance among all combinations <strong>uncorrelated with Z₁</strong>.</p>
<pre class="code">z_i2 = φ₁₂x_i1 + φ₂₂x_i2 + ... + φₚ₂x_ip

Key insight: constraining Z₂ to be uncorrelated with Z₁
is EQUIVALENT to constraining φ₂ to be ORTHOGONAL
(perpendicular) to φ₁.

For the mth PC, we add constraints ensuring
orthogonality with all previous m−1 PCs.

Maximum number of PCs = min(n−1, p)</pre>

<h3>Step-by-Step PCA Process</h3>
<p><strong>Step 1: Standardization.</strong> PCA is sensitive to the variance among datapoints. We don't want variables with large ranges to dominate. Standardize so each feature has mean=0 and std=1. If variables are in the same units, you might not scale; if different units, you must.</p>
<p><strong>Step 2: Covariance Matrix.</strong> Compute the covariance matrix to find relationships between variables. We don't want redundant information — the covariance matrix reveals which variables move together.</p>
<p><strong>Step 3: Principal Components Identification.</strong> Compute eigenvalues and eigenvectors of the covariance matrix. There can be as many PCs as variables. The first PC carries the largest variance. It is the line through the origin where projected points are most spread out — the line that maximizes the average squared distance from projected points to the origin.</p>
<p><strong>Step 4: Feature Vector.</strong> After obtaining all PCs, decide which to keep. Calculate what percentage of variance each PC captures. The first PC carries the most, decreasing for subsequent PCs. The chosen PCs form the <strong>feature vector</strong>.</p>
<p><strong>Step 5: Data Revision.</strong> Recast the initial data onto the PCs by multiplying the original (centered) data by the feature vector.</p>

<h3>Proportion of Variance Explained (PVE)</h3>
<pre class="code">Total variance (centered data):
  Σⱼ₌₁ᵖ Var(Xⱼ) = Σⱼ₌₁ᵖ (1/n) Σᵢ₌₁ⁿ xᵢⱼ²

Variance explained by mth PC:
  Var(Zₘ) = (1/n) Σᵢ₌₁ⁿ zᵢₘ²

Key identity:
  Σⱼ₌₁ᵖ Var(Xⱼ) = Σₘ₌₁ᴹ Var(Zₘ)
  where M = min(n−1, p)

PVE of mth PC:
  PVEₘ = Σᵢ zᵢₘ² / Σⱼ Σᵢ xᵢⱼ²

• PVE is between 0 and 1
• All PVEs sum to 1
• Cumulative PVE = sum of first m PVEs</pre>

<h3>How Many PCs to Use?</h3>
<p>Use the <strong>scree plot</strong>: plot PVE vs component number. Look for an <strong>"elbow"</strong> — the point where adding more components yields diminishing returns. Retain components before the elbow.</p>

<h3>Scaling Matters</h3>
<p>If variables are in <strong>different units</strong>, scaling each to std=1 is recommended. If in the same units, you might or might not scale. Unscaled PCA on mixed-unit data will be dominated by high-variance (large-scale) variables.</p>

<h3>Biplot</h3>
<p>A biplot displays both PC <strong>scores</strong> (observation positions) and <strong>loadings</strong> (variable contributions) on the same plot. Variable arrows show the direction and magnitude of each feature's contribution to the PCs.</p>

<h3>Worked Example 1: Basic PCA</h3>
<pre class="code">Data: 3 observations, 2 features
  (2,3), (3,4), (4,5)

Step 1: Center (means: X̄₁=3, X̄₂=4)
  Centered: (-1,-1), (0,0), (1,1)

Step 2: Covariance matrix (using 1/n, n=3)
  Var(X₁) = (1+0+1)/3 = 2/3
  Var(X₂) = (1+0+1)/3 = 2/3
  Cov(X₁,X₂) = ((-1)(-1)+0·0+1·1)/3 = 2/3
  Σ = [[2/3, 2/3],
       [2/3, 2/3]]

Step 3: Eigenvalues
  det(Σ − λI) = (2/3−λ)² − (2/3)² = 0
  λ² − (4/3)λ = 0 → λ(λ − 4/3) = 0
  λ₁ = 4/3,  λ₂ = 0

Step 4: PVE
  PVE₁ = (4/3)/(4/3+0) = 100%
  PVE₂ = 0% → only 1 PC needed!

Step 5: Eigenvector for λ₁
  φ₁ = (1/√2, 1/√2)
  PC1 = (1/√2)(X₁ + X₂)</pre>

<h3>Worked Example 2: Cold Chain Logistics (Tutorial 9)</h3>
<pre class="code">Data: Temperature deviation and Delay
  (-2,1), (-1,2), (1,3), (2,4)

Step 1: Center (means: X̄₁=0, X̄₂=2.5)
  Centered: (-2,-1.5), (-1,-0.5), (1,0.5), (2,1.5)

Step 2: Covariance (1/n, n=4)
  Var(X₁) = (4+1+1+4)/4 = 2.5
  Var(X₂) = (2.25+0.25+0.25+2.25)/4 = 1.25
  Cov = (3+0.5+0.5+3)/4 = 1.75
  Σ = [[2.5, 1.75],
       [1.75, 1.25]]

Step 3: Eigenvalues
  λ² − 3.75λ + 0.0625 = 0
  λ₁ ≈ 3.733,  λ₂ ≈ 0.017

Step 4: PVE
  PVE₁ = 3.733/3.75 ≈ 99.5% ← nearly all variance!
  Eigenvector: φ₁ ≈ (1/√2, 1/√2)

Step 5: Projections onto PC1
  z₁ = (-2-1.5)/√2 ≈ -2.475
  z₂ = (-1-0.5)/√2 ≈ -1.061
  z₃ = (1+0.5)/√2 ≈ 1.061
  z₄ = (2+1.5)/√2 ≈ 2.475

Interpretation: PC1 combines temp deviation and
delay with equal weights — a single underlying
factor affects shipment quality.</pre>

<h3>Worked Example 3: Customer Behavior (Tutorial 9)</h3>
<pre class="code">Covariance matrix:
  Σ = [[4, 3],     (using the problem's given Σ)
       [3, 9]]

Eigenvalues: λ² − 13λ + 27 = 0
  λ = (13 ± √(169−108))/2 = (13 ± √61)/2
  λ₁ ≈ 10.405,  λ₂ ≈ 2.595

PVE₁ = 10.405/13 ≈ 80.0%
PVE₂ = 2.595/13 ≈ 20.0%

Eigenvector for λ₁: (0.991, 0.134)ᵀ
  → PC1 is dominated by X₁ (visits)</pre>

<h3>Worked Example 4: Route Optimization (Tutorial 9)</h3>
<pre class="code">Z₁ = 0.6X₁ + 0.6X₂ + 0.529X₃
Eigenvalues: λ₁=5.5, λ₂=1.2, λ₃=0.3

Total variance = 5.5 + 1.2 + 0.3 = 7.0
PVE₁ = 5.5/7.0 = 78.6%
PVE₂ = 1.2/7.0 = 17.1%
PVE₃ = 0.3/7.0 = 4.3%
Cumulative (PC1+PC2) = 95.7% → retain 2

All loadings positive on PC1 → represents
"overall logistics effort" (distance, time, cost
all increase together).</pre>

<h3>USArrests Example (Lecture)</h3>
<p>The USArrests dataset contains arrests per 100,000 residents for Assault, Murder, and Rape, plus UrbanPop for 50 states. With n=50 and p=4, PCA was performed after standardizing. The biplot shows state scores and variable loading arrows. States like Florida and California score high on PC1 (high crime), while states like North Dakota score low.</p>

<h3>Python Implementation</h3>
<pre class="code">from sklearn.preprocessing import StandardScaler
from sklearn.decomposition import PCA

# Step 1: Standardize
scaler = StandardScaler()
X_scaled = scaler.fit_transform(X)

# Steps 2-5: Fit PCA
pca = PCA(n_components=2)
X_pca = pca.fit_transform(X_scaled)

# Results
pca.explained_variance_ratio_  # PVE per component
pca.components_                # loading vectors
pca.explained_variance_        # eigenvalues

# Cumulative PVE
import numpy as np
np.cumsum(pca.explained_variance_ratio_)</pre>

<div class="callout callout-warn"><div class="callout-label">Watch Out</div>Always standardize before PCA unless told otherwise. PCA is variance-sensitive — features with larger scales will dominate the PCs. The intercept/mean has no role in PCA (data is centered).</div>`,

kmeans:`<h2>K-Means Clustering</h2>
<h3>What is Clustering?</h3>
<p>Clustering refers to a broad set of techniques for finding <strong>subgroups (clusters)</strong> in a dataset. We seek a partition where observations within each group are quite <strong>similar</strong> to each other, while observations in different groups are <strong>different</strong>. What "similar" means is domain-specific.</p>

<h3>PCA vs Clustering</h3>
<p>PCA looks for a low-dimensional representation that explains variance. Clustering looks for homogeneous subgroups among observations. These are complementary — you might use PCA to reduce dimensions, then cluster in the reduced space.</p>

<h3>Use Cases</h3>
<ul>
<li><strong>Market segmentation:</strong> group shoppers by browsing/purchase history</li>
<li><strong>Genomics:</strong> cluster breast cancer patients by gene expression</li>
<li><strong>Healthcare:</strong> personalized communication for cancer screening, vaccination</li>
<li><strong>Anomaly detection:</strong> detecting medical errors in cancer treatment</li>
</ul>

<h3>K-Means: The Idea</h3>
<p>K-means is a <strong>centroid-based</strong> algorithm that minimizes the distance of data points to their cluster centroid. The user specifies K (number of clusters). Each cluster's center is obtained by averaging all points in the cluster — hence "K-<em>means</em>."</p>

<h3>Formal Definition</h3>
<pre class="code">Let C₁, ..., Cₖ denote sets of observation indices in each cluster.

Two properties:
1. C₁ ∪ C₂ ∪ ... ∪ Cₖ = {1,...,n}  (every obs in a cluster)
2. Cₖ ∩ Cₖ' = ∅ for k ≠ k'       (non-overlapping)

Objective: minimize total within-cluster variation

  min     Σₖ₌₁ᴷ WCV(Cₖ)
C₁,...,Cₖ

Within-cluster variation (Euclidean):

  WCV(Cₖ) = (1/|Cₖ|) Σᵢ,ᵢ'∈Cₖ Σⱼ₌₁ᵖ (xᵢⱼ − xᵢ'ⱼ)²

Equivalent form (key identity):

  (1/|Cₖ|) Σᵢ,ᵢ' ||xᵢ − xᵢ'||² = 2 Σᵢ∈Cₖ ||xᵢ − x̄ₖ||²

  where x̄ₖⱼ = (1/|Cₖ|) Σᵢ∈Cₖ xᵢⱼ  (centroid)</pre>
<div class="callout callout-info"><div class="callout-label">Exam Point</div>The pairwise distance formula equals twice the sum of squared distances to the centroid. This identity is why minimizing pairwise distances is the same as minimizing distances to centroids.</div>

<h3>K-Means Algorithm</h3>
<ol>
<li><strong>Step 1:</strong> Randomly assign each observation a number from 1 to K (initial cluster assignments)</li>
<li><strong>Step 2:</strong> Iterate until convergence:
<br/><strong>(2a)</strong> For each cluster, compute the <strong>centroid</strong> = vector of the p feature means for observations in that cluster
<br/><strong>(2b)</strong> Assign each observation to the cluster whose centroid is <strong>closest</strong> (Euclidean distance)</li>
</ol>
<div class="diagram">  K-Means with K=3:

  Step 1:           Step 2a:          Step 2b:
  Random assign     Compute centroids Reassign

  ● ○ △ ○           ● ○ △ ○           ● ● ○ ○
  △ ● ○ △    →      [★][◆][▲]   →    ● ● ○ △
  ○ △ ● ○           (centroids)       ○ △ △ △

  Repeat 2a → 2b until no assignments change</div>

<h3>Properties of the Algorithm</h3>
<ul>
<li>Algorithm is <strong>guaranteed to decrease</strong> the objective at each step — because (2a) minimizes WCV for fixed assignments, and (2b) minimizes assignments for fixed centroids</li>
<li>However, it is <strong>NOT guaranteed to find the global minimum</strong> — the result depends on the random initialization</li>
<li><strong>Solution:</strong> Run K-means multiple times (e.g., 10-20 times) with different random starts, keep the result with the <strong>lowest total WCV</strong></li>
</ul>

<h3>Why Not Global Minimum?</h3>
<p>Different starting values can lead to different local optima. The lecture shows K=3 clustering performed 6 times with different initializations — three different local optima were obtained, with the best having objective value 235.8.</p>

<h3>Worked Example (Lecture + Tutorial 9)</h3>
<pre class="code">Points: A(1,1), B(1.5,2), C(3,4), D(5,7).  K=2.

Step 1: Initial clusters: C₁={A,B}, C₂={C,D}

Step 2a: Compute centroids
  μ₁ = ((1+1.5)/2, (1+2)/2) = (1.25, 1.5)
  μ₂ = ((3+5)/2, (4+7)/2)   = (4, 5.5)

Step 2b: Reassign (Euclidean distances)
  Point A(1,1):
    d(A,μ₁) = √((1−1.25)²+(1−1.5)²) = √0.3125 ≈ 0.559
    d(A,μ₂) = √((1−4)²+(1−5.5)²)    = √29.25  ≈ 5.408
    → A stays in C₁ ✓

  Point B(1.5,2):
    d(B,μ₁) = √0.3125 ≈ 0.559
    d(B,μ₂) = √18.5   ≈ 4.301
    → B stays in C₁ ✓

  Point C(3,4):
    d(C,μ₁) = √9.3125 ≈ 3.051
    d(C,μ₂) = √3.25   ≈ 1.803
    → C stays in C₂ ✓

  Point D(5,7):
    d(D,μ₁) = √44.3125 ≈ 6.657
    d(D,μ₂) = √3.25    ≈ 1.803
    → D stays in C₂ ✓

No assignments changed → CONVERGED!

Final WCV:
  Cluster 1: ||A−μ₁||²+||B−μ₁||² = 0.3125+0.3125 = 0.625
  Cluster 2: ||C−μ₂||²+||D−μ₂||² = 3.25+3.25 = 6.5
  Total WCV = 0.625 + 6.5 = 7.125</pre>

<h3>Python Implementation</h3>
<pre class="code">from sklearn.cluster import KMeans

kmeans = KMeans(n_clusters=3, n_init=10, random_state=42)
kmeans.fit(X)

labels = kmeans.labels_           # cluster assignment
centroids = kmeans.cluster_centers_  # centroid positions
inertia = kmeans.inertia_         # total WCV</pre>`,

hierarchical:`<h2>Hierarchical Clustering</h2>
<h3>Key Advantage Over K-Means</h3>
<p>K-means requires pre-specifying K. Hierarchical clustering does <strong>NOT</strong> — instead, it produces a tree-like representation called a <strong>dendrogram</strong> that shows all possible clusterings from 1 to n clusters. You choose K after the fact by cutting the dendrogram at a chosen height.</p>

<h3>Agglomerative (Bottom-Up) Algorithm</h3>
<p>The most common type. The dendrogram is built starting from the <strong>leaves</strong> (individual observations) and combines clusters up to the <strong>trunk</strong>.</p>
<ol>
<li>Assign each observation to its own cluster (n initial clusters)</li>
<li>Find the two most similar (closest) clusters and <strong>merge</strong> them into one</li>
<li>Repeat step 2</li>
<li>End when all points are in a single cluster</li>
</ol>

<h3>Reading a Dendrogram</h3>
<div class="diagram">  Dendrogram Example:

  Height
  11.31 |         _____|_____
        |        |           |
        |        |           |
   1.41 |    ___|___     ___|___
        |   |       |   |       |
        |   A       B   C       D

  • Height of fusion = how different the merged clusters are
  • Lower height = more similar observations
  • Cut at height 9 → 2 clusters: {A,B} and {C,D}
  • Cut at height 5 → still 2 clusters (same)
  • Cut at height 1 → 4 clusters (no merges yet)</div>

<h3>Similarity and Linkage Criteria</h3>
<p>To measure similarity between clusters (when one or both contain multiple observations), we need <strong>linkage criteria</strong>. The distance between individual observations is typically <strong>Euclidean distance</strong>.</p>

<table class="tbl">
<tr><th>Linkage</th><th>Formula</th><th>Properties</th></tr>
<tr><td><strong>Single</strong></td><td>Minimum distance between closest pair in two clusters</td><td>Can produce long, chain-like clusters (chaining effect)</td></tr>
<tr><td><strong>Complete</strong></td><td>Maximum distance between farthest pair in two clusters</td><td>Produces compact, roughly spherical clusters</td></tr>
<tr><td><strong>Average</strong></td><td>Average of all pairwise distances between two clusters</td><td>Compromise between single and complete</td></tr>
<tr><td><strong>Centroid</strong></td><td>Distance between cluster centroids</td><td>Less common, can have inversions</td></tr>
<tr><td><strong>Ward</strong></td><td>Minimizes total within-cluster sum of squares after merge</td><td>Similar philosophy to K-means, produces even-sized clusters</td></tr>
</table>

<div class="diagram">  Linkage Illustrations:

  Single:              Complete:            Average:
  Cluster A  Cluster B  Cluster A  Cluster B  Cluster A  Cluster B

   ∗  ∗       ○  ○      ∗  ∗       ○  ○      ∗  ∗       ○  ○
   ∗  ∗  ←→   ○  ○      ∗  ∗  ←══→ ○  ○      ∗──∗──+──+──○──○
   ∗  ∗   ↑   ○  ○      ∗  ∗   ↑   ○  ○      ∗  ∗  avg  ○  ○
        min dist             max dist           all pairs</div>

<h3>Worked Example: Complete Linkage (Tutorial 9)</h3>
<pre class="code">Points: A(1,1), B(2,2), C(8,8), D(9,9)

Step 1: Compute all pairwise Euclidean distances
  d(A,B) = √((1−2)²+(1−2)²) = √2 ≈ 1.41
  d(C,D) = √((8−9)²+(8−9)²) = √2 ≈ 1.41
  d(A,C) = √((1−8)²+(1−8)²) = √98 = 7√2 ≈ 9.90
  d(A,D) = √((1−9)²+(1−9)²) = √128 = 8√2 ≈ 11.31
  d(B,C) = √((2−8)²+(2−8)²) = √72 = 6√2 ≈ 8.49
  d(B,D) = √((2−9)²+(2−9)²) = √98 = 7√2 ≈ 9.90

Distance matrix:
       A     B     C     D
  A    0    1.41  9.90  11.31
  B         0    8.49   9.90
  C              0      1.41
  D                     0

Step 2: First merge
  Smallest distances: d(A,B) = d(C,D) = √2 ≈ 1.41
  Merge A&B at height 1.41
  Merge C&D at height 1.41

Step 3: Next merge (complete linkage)
  d_complete({A,B}, {C,D}) = max(d(A,C), d(A,D), d(B,C), d(B,D))
                            = max(9.90, 11.31, 8.49, 9.90)
                            = 11.31

  Merge {A,B} and {C,D} at height 11.31

Cutting the dendrogram:
  Any height h with √2 < h < 8√2 → 2 clusters: {A,B}, {C,D}
  Within each group: d = √2 (very close)
  Between groups: d ≥ 6√2 (very far) → well-separated!</pre>

<h3>K-Means vs Hierarchical: Comparison</h3>
<table class="tbl">
<tr><th>Property</th><th>K-Means</th><th>Hierarchical</th></tr>
<tr><td>Specify K?</td><td>Yes, in advance</td><td>No (choose after via dendrogram)</td></tr>
<tr><td>Deterministic?</td><td>No (random initialization)</td><td>Yes (for same linkage/distance)</td></tr>
<tr><td>Scalability</td><td>Good for large n</td><td>O(n²) memory, O(n³) time</td></tr>
<tr><td>Cluster shape</td><td>Spherical/convex</td><td>Arbitrary (depends on linkage)</td></tr>
<tr><td>Re-assignment?</td><td>Yes (iterative)</td><td>No (once merged, stays merged)</td></tr>
</table>

<h3>Python Implementation</h3>
<pre class="code">from scipy.cluster.hierarchy import dendrogram, linkage, fcluster
import matplotlib.pyplot as plt

# Compute linkage matrix
Z = linkage(X, method='complete')  # or 'single', 'average', 'ward'

# Plot dendrogram
dendrogram(Z)
plt.show()

# Cut into k clusters
clusters = fcluster(Z, t=2, criterion='maxclust')</pre>`,

nn:`<h2>Neural Networks</h2>
<h3>What is a Neural Network?</h3>
<p>NNs are advanced computational models designed to recognize patterns and relationships in data. They mimic the human brain's structure, enabling machines to perform tasks like image recognition, speech processing, and complex decision-making.</p>

<h3>Why Neural Networks?</h3>
<p>Traditional ML methods (regression, trees, SVM) can struggle with complex datasets with many features (e.g., images). Neural networks are uniquely equipped to extract meaningful patterns from such data. Examples: image classification (cat vs dog), handwritten digit recognition (0-9), facial recognition.</p>

<h3>AI → ML → Neural Networks → Deep Learning</h3>
<ul>
<li><strong>AI:</strong> broadest field — systems that mimic human intelligence</li>
<li><strong>ML:</strong> subset of AI — systems learn from data without explicit programming</li>
<li><strong>Neural Networks:</strong> subset of ML — algorithms with layered nodes</li>
<li><strong>Deep Learning:</strong> neural networks with many hidden layers, trained on large datasets</li>
</ul>

<h3>Biological Inspiration</h3>
<p>A human neuron has <strong>dendrites</strong> (receptors collecting input), a <strong>nucleus</strong> (activated based on input), and an <strong>axon</strong> (transfers output to other neurons). Artificial neurons mirror this: inputs → weighted sum → activation → output.</p>

<h3>Architecture</h3>
<div class="diagram">  Neural Network Architecture:

    Input Layer       Hidden Layer(s)      Output Layer

     x₁ ─────────╲       h₁  ╲
                    ╲   ╱       ╲
     x₂ ──────────── ╳ ──── h₂ ───╳────── ŷ
                    ╱   ╲       ╱
     x₃ ─────────╱       h₃  ╱

  • Each connection has a weight w
  • Each neuron computes: output = g(Σwᵢxᵢ + b)
  • g() is the activation function
  • b is the bias term</div>

<ul>
<li><strong>Input Layer:</strong> holds the raw data (features). No computation — just passes values forward.</li>
<li><strong>Hidden Layer(s):</strong> process information using weights, biases, and activation functions. This is where "learning" happens. Deep networks have many hidden layers.</li>
<li><strong>Output Layer:</strong> produces the final prediction/classification result.</li>
</ul>

<h3>Perceptrons: The Building Blocks</h3>
<p><strong>Single-layer perceptron:</strong> all inputs connected directly to output. Can only handle <strong>linearly separable</strong> problems.</p>
<p><strong>Multi-layer perceptron (MLP):</strong> multiple layers including hidden layers. Can learn <strong>non-linear</strong> relationships. The more layers, the more complex patterns can be captured.</p>

<h3>The Role of Bias</h3>
<p>Bias fine-tunes how a perceptron makes decisions. It allows the neuron to produce a meaningful output even when <strong>all inputs are zero</strong>. Without bias, the output would always be zero when inputs are zero.</p>
<pre class="code">Output = g(Bias + Σ(Inputs × Weights))
       = g(b + w₁x₁ + w₂x₂ + ... + wₙxₙ)</pre>

<h3>Forward Propagation — Step by Step</h3>
<p>Data flows through the network layer by layer:</p>
<ol>
<li>Input features enter the input layer</li>
<li>For each hidden neuron: compute <strong>z = Σwᵢxᵢ + b</strong> (weighted sum + bias)</li>
<li>Apply activation function: <strong>h = g(z)</strong></li>
<li>Hidden outputs become inputs to the next layer</li>
<li>Output layer produces the final prediction</li>
</ol>

<h3>Common Activation Functions — KNOW ALL 5</h3>
<table class="tbl">
<tr><th>Function</th><th>Formula</th><th>Range</th><th>Use Case</th><th>Advantages</th><th>Challenges</th></tr>
<tr><td><strong>Sigmoid</strong></td><td>g(z) = 1/(1+e⁻ᶻ)</td><td>(0, 1)</td><td>Binary classification output</td><td>Smooth gradient, outputs probabilities</td><td>Vanishing gradients, non-zero-centered</td></tr>
<tr><td><strong>Tanh</strong></td><td>g(z) = (eᶻ−e⁻ᶻ)/(eᶻ+e⁻ᶻ)</td><td>(−1, 1)</td><td>Hidden layers</td><td>Zero-centered, smooth gradient</td><td>Vanishing gradients</td></tr>
<tr><td><strong>ReLU</strong></td><td>g(z) = max(0, z)</td><td>[0, ∞)</td><td>Hidden layers (most popular)</td><td>Simple, mitigates vanishing gradients</td><td>"Dying ReLU" + exploding gradients</td></tr>
<tr><td><strong>Leaky ReLU</strong></td><td>g(z) = max(0.1z, z)</td><td>(−∞, ∞)</td><td>Hidden layers</td><td>Fixes "dying ReLU"</td><td>Slightly more complex</td></tr>
<tr><td><strong>Softmax</strong></td><td>g(zₖ) = eᶻᵏ/Σeᶻʲ</td><td>(0,1), sum=1</td><td>Multi-class output</td><td>Converts to probabilities</td><td>Computationally intensive</td></tr>
</table>

<div class="diagram">  Activation Function Shapes:

  Sigmoid:        Tanh:           ReLU:         Leaky ReLU:
       ___            ___           ╱              ╱
      ╱               ╱            ╱              ╱
  ___╱            ___╱         ___╱           ___╱
  0 to 1          -1 to 1      0 if z&lt;0       0.1z if z&lt;0
  S-shaped        S-shaped     ramp            ramp w/ leak</div>

<h3>Key Comparisons</h3>
<p><strong>Sigmoid vs Tanh:</strong> Both are S-shaped. Tanh is preferred in hidden layers because it's <strong>zero-centered</strong>, making optimization more efficient.</p>
<p><strong>ReLU vs Leaky ReLU:</strong> ReLU is simple and effective but can "die" (neuron stuck at 0 permanently). Leaky ReLU fixes this by allowing a small gradient (0.1) for negative inputs.</p>
<p><strong>Softmax:</strong> Converts raw scores into probabilities that sum to 1. Used exclusively in the output layer for multi-class classification.</p>

<h3>Practical Considerations</h3>
<ul>
<li><strong>Vanishing Gradients:</strong> Sigmoid and tanh can lead to very small gradients in deep networks, making training extremely slow. ReLU and variants help mitigate this.</li>
<li><strong>Dying ReLU:</strong> If a neuron always receives negative weighted sums, ReLU always outputs 0 and gradient is 0 — the neuron is permanently "dead." Leaky ReLU prevents this.</li>
<li><strong>Exploding Gradients:</strong> Gradients become too large, causing unstable training. Proper initialization and batch normalization help.</li>
</ul>

<h3>Backpropagation — The Learning Phase</h3>
<p>After forward propagation, the network compares its prediction to the actual answer using a <strong>loss function</strong>. Backpropagation sends the error signal backward through the network, adjusting weights and biases using the <strong>chain rule</strong>.</p>
<pre class="code">Chain rule for backpropagation:

  ∂Loss/∂w = ∂Loss/∂ŷ · ∂ŷ/∂z · ∂z/∂w

This chain allows computing gradients for weights
in ANY layer, no matter how deep the network.

Weight update rule:
  w ← w − η · ∂Loss/∂w

where η is the learning rate.

Cycle: forward prop → compute loss → backprop → update → repeat
Each cycle makes the network slightly better at its task.</pre>

<h3>Loss Functions</h3>
<ul>
<li><strong>MSE (regression):</strong> L = (1/n) Σ(yᵢ − ŷᵢ)²</li>
<li><strong>Cross-entropy (classification):</strong> L = −Σ[yᵢ log(ŷᵢ) + (1−yᵢ)log(1−ŷᵢ)]</li>
</ul>

<h3>Worked Example: Forward Propagation (Lecture)</h3>
<pre class="code">Network: 2 inputs, 2 hidden neurons (sigmoid), 1 output (sigmoid)

Given:
  Inputs: x₁ = 1, x₂ = 2
  Weights (input→hidden):
    w₁₁ = 0.5,  w₁₂ = −0.5
    w₂₁ = 0.3,  w₂₂ = 0.8
  Hidden bias: b_hidden = 0.1
  Weights (hidden→output):
    w₃₁ = 1.0,  w₃₂ = −1.0
  Output bias: b_output = 0.2

Hidden Layer Computation:
  z_h1 = w₁₁·x₁ + w₂₁·x₂ + b_h
       = 0.5(1) + 0.3(2) + 0.1 = 0.5 + 0.6 + 0.1 = 1.2
  h₁ = sigmoid(1.2) = 1/(1+e⁻¹·²) ≈ 0.769

  z_h2 = w₁₂·x₁ + w₂₂·x₂ + b_h
       = −0.5(1) + 0.8(2) + 0.1 = −0.5 + 1.6 + 0.1 = 1.2
  h₂ = sigmoid(1.2) ≈ 0.769

Output Layer Computation:
  z_o = w₃₁·h₁ + w₃₂·h₂ + b_o
      = 1.0(0.769) + (−1.0)(0.769) + 0.2
      = 0.769 − 0.769 + 0.2 = 0.2
  ŷ = sigmoid(0.2) = 1/(1+e⁻⁰·²) ≈ 0.550

Final output: ŷ ≈ 0.550</pre>

<h3>Regularization in Neural Networks</h3>
<p>To prevent overfitting, several techniques are used:</p>
<ul>
<li><strong>Dropout:</strong> randomly deactivate neurons during training</li>
<li><strong>Early stopping:</strong> stop training when validation error starts increasing</li>
<li><strong>Weight decay (L2 regularization):</strong> penalize large weights</li>
</ul>

<h3>Key Terminology</h3>
<table class="tbl">
<tr><th>Term</th><th>Definition</th></tr>
<tr><td>Perceptron</td><td>Single neuron — basic building block</td></tr>
<tr><td>MLP</td><td>Multi-Layer Perceptron — multiple hidden layers</td></tr>
<tr><td>Epoch</td><td>One complete pass through the training data</td></tr>
<tr><td>Batch size</td><td>Number of samples processed before updating weights</td></tr>
<tr><td>Learning rate (η)</td><td>Step size for weight updates (too high: unstable; too low: slow)</td></tr>
<tr><td>Black box</td><td>NN internals are hard to interpret — input/output visible but inner workings hidden</td></tr>
</table>

<div class="callout callout-info"><div class="callout-label">Exam Point</div>Be able to perform <strong>forward propagation by hand</strong>. Know all 5 activation functions and their properties (range, use case, issue). Understand backpropagation conceptually (chain rule) — you likely won't compute full backprop derivatives, but know the concept.</div>`,

svm:`<h2>Support Vector Machines (SVM)</h2>
<h3>A Geometric Approach to Classification</h3>
<p>SVM takes a <strong>geometric perspective</strong> to solve classification: draw the best possible separating boundary between two classes. "Best" means the boundary is as <strong>far as possible</strong> from the closest data points of both classes — this distance is the <strong>margin</strong>.</p>
<p>SVM was initially developed as a linear classifier, resembling logistic regression. However, SVM's advantage is its <strong>non-statistical approach</strong> — it performs well even when the number of features <strong>exceeds</strong> the number of observations (p > n), such as in gene expression classification.</p>

<h3>What is a Hyperplane?</h3>
<pre class="code">General equation: β₀ + β₁X₁ + β₂X₂ + ... + βₚXₚ = 0

Compact form: β₀ + βᵀx = 0,  where β = (β₁, β₂, ..., βₚ)

• In p = 2 dimensions → hyperplane is a LINE
• In p = 3 dimensions → hyperplane is a PLANE
• In general → (p−1)-dimensional subspace

• β = (β₁,...,βₚ) is the NORMAL VECTOR
  (perpendicular to the hyperplane surface)
• If β₀ = 0, the hyperplane passes through the origin</pre>

<h3>Separating Hyperplanes</h3>
<pre class="code">If f(X) = β₀ + β₁X₁ + ... + βₚXₚ, then:
  • f(X) > 0 for points on one side
  • f(X) < 0 for points on the other side

If we code classes as yᵢ = +1 and yᵢ = −1, then:
  yᵢ · f(Xᵢ) > 0 for all i  ⟹  f(X) = 0 is a
  separating hyperplane (all points correctly classified)

Perpendicular distance from point x to hyperplane:
  d = |f(x)| / ||β|| = |β₀ + βᵀx| / √(Σβⱼ²)</pre>

<div class="diagram">  Separating Hyperplane in 2D:

         f(x) > 0 side          f(x) < 0 side
    (class +1)                  (class −1)

    ∗   ∗                            ○  ○
    ∗     ∗   ┃ ← hyperplane   ○       ○
    ∗       ∗ ┃              ○   ○
              ┃                    ○
    β is perpendicular to the line (normal vector)</div>

<h3>Maximal Margin Classifier</h3>
<p>Among all separating hyperplanes, find the one with the <strong>biggest margin</strong> (gap between the two classes).</p>
<pre class="code">Optimization problem:

  maximize M
  over β₀, β₁, ..., βₚ

  subject to:
    Σⱼ₌₁ᵖ βⱼ² = 1  (normalize β)
    yᵢ(β₀ + β₁xᵢ₁ + ... + βₚxᵢₚ) ≥ M  for all i = 1,...,n

This is a convex quadratic program, solvable efficiently.
M is the margin — the distance from the hyperplane
to the closest data point on either side.</pre>

<h3>Margin Classifier: Bias-Variance</h3>
<p>A classifier with <strong>narrow margins</strong> (edges very close together) has:</p>
<ul>
<li><strong>High variance</strong> — very sensitive to new observations</li>
<li><strong>Low bias</strong> — produces low training errors but high test errors</li>
</ul>
<p>To avoid this, we use <strong>soft margins</strong> allowing some misclassification.</p>

<h3>Support Vector Classifier (Soft Margin)</h3>
<p>When data isn't perfectly separable (or is noisy), we allow some violations using <strong>slack variables ξᵢ</strong>:</p>
<pre class="code">maximize M
over β₀, β₁, ..., βₚ, ξ₁, ..., ξₙ

subject to:
  Σⱼ βⱼ² = 1
  yᵢ(β₀ + β₁xᵢ₁ + ... + βₚxᵢₚ) ≥ M(1 − ξᵢ)
  ξᵢ ≥ 0
  Σᵢ₌₁ⁿ ξᵢ ≤ C    (budget constraint)</pre>

<h3>Slack Variable Interpretation</h3>
<table class="tbl">
<tr><th>ξᵢ value</th><th>Where is the point?</th><th>Status</th></tr>
<tr><td>ξᵢ = 0</td><td>On or outside the margin</td><td>Correctly classified</td></tr>
<tr><td>0 < ξᵢ < 1</td><td>Inside the margin (margin violator)</td><td>Correct side, but within margin</td></tr>
<tr><td>ξᵢ = 1</td><td>Exactly on the hyperplane</td><td>On the decision boundary</td></tr>
<tr><td><strong>ξᵢ > 1</strong></td><td><strong>Wrong side of hyperplane</strong></td><td><strong>MISCLASSIFIED</strong></td></tr>
</table>

<div class="callout callout-info"><div class="callout-label">Exam Point</div><strong>C is a regularization parameter (budget):</strong><br/>
• <strong>Large C:</strong> Few violations allowed → narrow margin → low bias, high variance<br/>
• <strong>Small C:</strong> Many violations allowed → wide margin → high bias, low variance<br/>
C controls the bias-variance tradeoff, like λ in regularization.</div>

<h3>Worked Example: Hyperplane Geometry (Tutorial 8)</h3>
<pre class="code">Classifier: f(x) = 2X₁ + X₂ − 5

Observations:
  Obs 1: (1,3), y=+1 → f = 2(1)+3−5 = 0  (on boundary!)
  Obs 2: (2,2), y=+1 → f = 2(2)+2−5 = 1  (predicted +1 ✓)
  Obs 3: (3,1), y=−1 → f = 2(3)+1−5 = 2  (predicted +1 ✗)
  Obs 4: (4,3), y=−1 → f = 2(4)+3−5 = 6  (predicted +1 ✗)

Perpendicular distances: ||β|| = √(2²+1²) = √5
  d₁ = |0|/√5 = 0
  d₂ = |1|/√5 ≈ 0.447  ← closest (potential SV)
  d₃ = |2|/√5 ≈ 0.894
  d₄ = |6|/√5 ≈ 2.683</pre>

<h3>Worked Example: Margin Calculation (Tutorial 8)</h3>
<pre class="code">Hyperplane: 3X₁ + 4X₂ − 12 = 0
  ||β|| = √(9+16) = √25 = 5

Distances:
  d(2,1) = |6+4−12|/5 = 2/5 = 0.4
  d(3,2) = |9+8−12|/5 = 5/5 = 1.0
  d(1,2) = |3+8−12|/5 = 1/5 = 0.2

If margin width = 1, half-margin = 0.5:
  (2,1): 0.4 < 0.5 → INSIDE margin
  (3,2): 1.0 > 0.5 → outside margin
  (1,2): 0.2 < 0.5 → INSIDE margin

Scaling invariance: replacing β with cβ doesn't change
the geometric hyperplane or distances. The constraint
||β|| = 1 makes the problem well-defined.</pre>

<h3>Worked Example: Soft Margin (Tutorial 8)</h3>
<pre class="code">Trained SVM output values:
  Obs 1: y=+1, f(x)=1.8 → y·f(x)=1.8 > 1 → outside margin (ξ=0)
  Obs 2: y=+1, f(x)=0.6 → y·f(x)=0.6     → inside margin  (ξ=0.4)
  Obs 3: y=+1, f(x)=−0.4→ y·f(x)=−0.4 < 0 → MISCLASSIFIED  (ξ=1.4)
  Obs 4: y=−1, f(x)=−1.5→ y·f(x)=1.5 > 1 → outside margin (ξ=0)
  Obs 5: y=−1, f(x)=−0.7→ y·f(x)=0.7     → inside margin  (ξ=0.3)

Effect of increasing C:
  Larger C → heavier penalty for violations → fewer ξᵢ > 0
  → narrower margin, fewer support vectors
  → pushes toward hard-margin solution</pre>

<h3>When Linear Boundaries Fail → Feature Expansion</h3>
<p>Sometimes a linear boundary won't work regardless of C. Solution: <strong>enlarge the feature space</strong> with transformations.</p>
<pre class="code">Example: Instead of (X₁, X₂), use (X₁, X₂, X₁², X₂², X₁X₂)

Decision boundary becomes:
  β₀ + β₁X₁ + β₂X₂ + β₃X₁² + β₄X₂² + β₅X₁X₂ = 0

This is linear in the ENLARGED space but produces
nonlinear (quadratic) boundaries in the ORIGINAL space.

Cubic expansion: from 2 variables to 9:
  β₀ + β₁X₁ + β₂X₂ + β₃X₁² + β₄X₂² + β₅X₁X₂
  + β₆X₁³ + β₇X₂³ + β₈X₁²X₂ + β₉X₁X₂² = 0</pre>

<h3>Kernel Functions</h3>
<p>Instead of explicitly computing the transformation, SVM uses a <strong>kernel function</strong> to compute inner products in the high-dimensional space implicitly. Three kernel types:</p>

<table class="tbl">
<tr><th>Kernel</th><th>Formula</th><th>Properties</th></tr>
<tr><td><strong>Linear</strong></td><td>K(x,x') = xᵀx'</td><td>Flat hyperplane, fast, for linearly separable data</td></tr>
<tr><td><strong>Polynomial</strong></td><td>K(x,x') = (1 + xᵀx')ᵈ</td><td>d = degree. d=1 → linear. Higher d → more complex curves</td></tr>
<tr><td><strong>RBF (Radial)</strong></td><td>K(xᵢ,xᵢ') = exp(−γΣⱼ(xᵢⱼ−xᵢ'ⱼ)²)</td><td>Infinite-dimensional. Distance-based. Most flexible.</td></tr>
</table>

<div class="diagram">  Kernel Trick Visualization:

  Original 1D (not separable):     Projected to 2D (separable!):

  ○ ○ ○ ∗ ∗ ∗ ○ ○ ○                ○     ○  ○
  ←─────────────────→                 ○  ∗  ∗  ∗ ○
  Can't draw a single point           ▔▔╱  ∗  ∗  ╲▔▔
  to separate!                         Line separates!

  Transformation: y = x²
  Linear in 2D = nonlinear (parabolic) in 1D</div>

<h3>Worked Example: RBF Kernel (Tutorial 8)</h3>
<pre class="code">Points: x₁=(1,2), x₂=(3,4), x₃=(2,3), γ=0.5

Squared distances:
  ||x₁−x₂||² = (1−3)²+(2−4)² = 4+4 = 8
  ||x₁−x₃||² = (1−2)²+(2−3)² = 1+1 = 2

Kernel values:
  K(x₁,x₂) = e^(−0.5×8) = e^(−4) ≈ 0.0183  (very low similarity)
  K(x₁,x₃) = e^(−0.5×2) = e^(−1) ≈ 0.3679  (higher similarity)

Interpretation:
  K = 1 → identical points
  K → 0 → far apart
  Higher γ → faster decay → more localized influence
              → more complex boundary → OVERFIT risk
  Lower γ → broader influence → smoother boundary</pre>

<h3>Worked Example: Feature Expansion (Tutorial 8)</h3>
<pre class="code">Transform: Z₁ = X₁², Z₂ = X₂²

Linear boundary in Z-space: Z₁ + Z₂ = 4
Substituting back: X₁² + X₂² = 4

This is a CIRCLE of radius 2 in the original space!
  • X₁² + X₂² > 4 → classified +1 (outside circle)
  • X₁² + X₂² < 4 → classified −1 (inside circle)

Linear in transformed = nonlinear in original.</pre>

<h3>Multiclass SVM</h3>
<p>SVM is inherently binary (K=2). For K > 2 classes, two strategies:</p>

<table class="tbl">
<tr><th>Method</th><th># Classifiers</th><th>How It Works</th><th>When to Use</th></tr>
<tr><td><strong>OVR</strong> (One-vs-Rest)</td><td>K</td><td>Each class vs all others. Pick highest confidence.</td><td>Many classes, default choice</td></tr>
<tr><td><strong>OVO</strong> (One-vs-One)</td><td>K(K−1)/2</td><td>Every pair. Majority vote.</td><td>K not too large, SVMs typically use OVO</td></tr>
</table>

<h3>Worked Example: Fruit Classification (Lecture)</h3>
<pre class="code">Classes: Apple (A), Banana (B), Orange (C)

OVR (3 classifiers):
  Model 1: Apple vs (Banana+Orange) → score 0.80
  Model 2: Banana vs (Apple+Orange) → score 0.10
  Model 3: Orange vs (Apple+Banana) → score 0.20
  Predict: Apple (highest score)

OVO (3 classifiers = C(3,2)):
  A vs B → Apple       A vs C → Apple       B vs C → Banana
  Votes: Apple=2, Banana=1, Orange=0
  Predict: Apple (most votes)</pre>

<h3>SVM vs Logistic Regression</h3>
<ul>
<li>Classes (nearly) <strong>separable</strong> → SVM does better than LR</li>
<li>When not → LR (with ridge penalty) and SVM very similar</li>
<li>Need <strong>probability estimates</strong> → LR is the choice</li>
<li><strong>Nonlinear boundaries</strong> → kernel SVMs are popular</li>
<li><strong>p > n</strong> (more features than observations) → SVM works well</li>
</ul>

<h3>SVM for Regression</h3>
<p>SVMs can also solve regression problems using <code class="il">sklearn.svm.SVR</code> or <code class="il">LinearSVR</code>. The implementation is similar to classification.</p>

<h3>Python Implementation</h3>
<pre class="code">from sklearn.svm import SVC, LinearSVC
from sklearn import metrics

# Linear SVM (two options, different optimizers)
model = LinearSVC()               # liblinear, fast
model = SVC(kernel='linear')      # libsvm, slower

# Polynomial kernel
model = SVC(kernel='poly', degree=3)

# RBF kernel
model = SVC(kernel='rbf', gamma=0.5, C=1.0)

model.fit(X_train, y_train)
pred = model.predict(X_test)
print(metrics.accuracy_score(y_test, pred))
print(metrics.confusion_matrix(y_test, pred))

# Multiclass
from sklearn.multiclass import OneVsRestClassifier, OneVsOneClassifier
ovr = OneVsRestClassifier(SVC(kernel='linear'))
ovo = OneVsOneClassifier(SVC(kernel='linear'))

# Regression
from sklearn.svm import SVR
svr = SVR(kernel='linear')
svr.fit(X_train, y_train)</pre>

<h3>Gene Data Example (Lecture)</h3>
<p>Khan gene data: 2308 features, 63 observations, 4 tumor types. Results showed LinearSVC achieved <strong>100% accuracy</strong> while Logistic Regression got 90% and Naive Bayes only 45%. SVM excels when p >> n.</p>

<div class="callout callout-info"><div class="callout-label">Exam Point</div>Know how to: (1) compute f(x) and classify points, (2) compute distance to hyperplane, (3) interpret ξ values, (4) compute RBF kernel values, (5) determine OVR/OVO classifier count, (6) explain the effect of C and γ on bias-variance.</div>`};

{q:'Which of the following statements about PCA is correct?',o:['PCA is a supervised learning method that uses response variable Y to find principal components','PCA finds linear combinations of features with maximal variance that are mutually uncorrelated','PCA always increases the number of features in a dataset','PCA requires the data to have a response variable'],a:1,e:'PCA is unsupervised — it only uses features X₁,...,Xₚ (no Y). It finds directions of maximum variance.'},
{q:'Consider the following Python code. What does it do?\n\nscaler = StandardScaler()\nX_s = scaler.fit_transform(X)\npca = PCA(n_components=2)\nX_pca = pca.fit_transform(X_s)',o:['Applies PCA without standardization, keeping 2 features','Standardizes features then reduces to 2 principal components','Performs clustering with 2 clusters','Applies ridge regression with 2 predictors'],a:1,e:'StandardScaler standardizes (mean=0, std=1), then PCA reduces to 2 components. This is the correct PCA workflow.'},
{q:'A dataset has eigenvalues λ₁=8.0, λ₂=1.5, λ₃=0.3, λ₄=0.2. What is the cumulative PVE for the first two PCs?',o:['80.0%','95.0%','85.0%','15.0%'],a:1,e:'Total = 8.0+1.5+0.3+0.2 = 10.0. Cumulative PVE(1+2) = (8.0+1.5)/10.0 = 9.5/10.0 = 95.0%.'},
{q:'Which of the following is NOT a step in the PCA process?',o:['Standardize the data','Compute the covariance matrix','Train a regression model on the principal components','Compute eigenvalues and eigenvectors'],a:2,e:'PCA is unsupervised — it does not train a regression model. The 5 steps are: standardize, covariance, eigen, choose PCs, project.'},
{q:'If variables in a dataset are measured in different units (e.g., meters vs kilograms), what should you do before applying PCA?',o:['Nothing — PCA handles different scales automatically','Scale each variable to have standard deviation equal to 1','Remove the variable with the smallest range','Convert all variables to the same unit manually'],a:1,e:'PCA is dominated by high-variance features. Different units cause artificial variance differences. Standardizing (std=1) prevents this.'},
{q:'A PCA loading vector φ₁ = (0.7, 0.7, 0.1) for three features. Which statement is correct?',o:['All three features contribute equally to PC1','Features 1 and 2 dominate PC1 with roughly equal weight; feature 3 contributes little','Feature 3 is the most important for PC1','The loadings violate the normalization constraint'],a:1,e:'Loadings 0.7, 0.7, 0.1 show features 1 and 2 dominate. Check: 0.7²+0.7²+0.1² = 0.49+0.49+0.01 = 0.99 ≈ 1 ✓'},
{q:'What is the maximum number of principal components for a dataset with n=100 observations and p=20 features?',o:['100','20','99','min(99,20) = 20'],a:3,e:'Max PCs = min(n−1, p) = min(99, 20) = 20.'},
{q:'In a PCA scree plot, how do you determine the number of components to retain?',o:['Always keep all components','Keep only the first component','Look for an "elbow" where additional components add little variance','Keep components with PVE < 5%'],a:2,e:'The elbow point indicates diminishing returns — components after the elbow add little information.'},
{q:'You want to apply PCA for visualization. Choose the correct leakage-safe code.',o:['pca = PCA(n_components=2)\nX_pca = pca.fit_transform(X)\nX_train, X_test = train_test_split(X_pca)','scaler = StandardScaler()\nX_train_s = scaler.fit_transform(X_train)\nX_test_s = scaler.transform(X_test)\npca = PCA(n_components=2)\nX_train_pca = pca.fit_transform(X_train_s)\nX_test_pca = pca.transform(X_test_s)','X_s = StandardScaler().fit_transform(X)\npca = PCA(n_components=2).fit(X_s)\nX_train, X_test = train_test_split(X_s)','pca = PCA(n_components=2)\nX_train_pca = pca.fit_transform(X_train)\nX_test_pca = pca.fit_transform(X_test)'],a:1,e:'fit_transform on train, transform on test — for BOTH scaler and PCA. Fitting on all data or calling fit_transform on test causes leakage.'},
{q:'After running PCA, you access pca.explained_variance_ratio_. If it returns [0.72, 0.18, 0.07, 0.03], how many components capture at least 90% of variance?',o:['1','2','3','4'],a:2,e:'Cumulative: 0.72, 0.72+0.18=0.90, 0.90+0.07=0.97. At 2 components you hit exactly 90%. But "at least 90%" means ≥ 0.90. 2 components give exactly 0.90, so 2 suffices. However the question says "at least" — 2 PCs give 90.0% which meets the threshold.'},
{q:'A covariance matrix has eigenvalues λ₁=0, λ₂=0, λ₃=5. What does this tell you about the data?',o:['The data has no variance at all','The data lies entirely in a 1-dimensional subspace (all variation along one direction)','PCA cannot be applied','The features are independent'],a:1,e:'Two zero eigenvalues mean two directions have no variance — the data is confined to 1 dimension. Only 1 PC is needed (PVE₃ = 100%).'},
],
kmeans:[
{q:'Which of the following statements about K-Means clustering is correct?',o:['K-Means is guaranteed to find the global minimum of the within-cluster variation','K-Means requires specifying the number of clusters K in advance','K-Means does not require specifying K — it determines the optimal K automatically','K-Means is a supervised learning method that uses class labels'],a:1,e:'K-Means requires K to be specified. It only finds a local minimum (depends on initialization). It is unsupervised (no labels).'},
{q:'Consider K-Means with K=3. After running the algorithm 6 times with different random starts, the objective values are: 320, 285, 310, 285, 295, 285. Which result should be selected?',o:['The first run (320) because it ran first','Any of the runs with objective 285','The average of all runs','The run with the highest objective (320)'],a:1,e:'Select the run with the LOWEST total within-cluster variation. Three runs achieved 285 (the minimum), so select any of those.'},
{q:'Points A(1,1) and B(3,5) are in cluster 1. What is the centroid?',o:['(1,1)','(3,5)','(2,3)','(4,6)'],a:2,e:'Centroid = ((1+3)/2, (1+5)/2) = (2, 3). The centroid is the vector of feature means.'},
{q:'Which of the following Python code correctly applies K-Means clustering?',o:['KMeans(n_clusters=3).fit_predict(X)','KMeans(K=3).cluster(X)','KMeans(clusters=3).transform(X)','KMeans(n_clusters=3).fit_transform(X)'],a:0,e:'sklearn uses n_clusters parameter with fit_predict() to get cluster labels. fit_transform() is for dimensionality reduction methods like PCA.'},
{q:'In K-Means, the within-cluster variation WCV(Cₖ) = (1/|Cₖ|) Σ ||xᵢ − xᵢ\'||² is equivalent to:',o:['The variance of the cluster','2 Σᵢ∈Cₖ ||xᵢ − x̄ₖ||² (twice sum of squared distances to centroid)','The distance between centroids','The number of observations in the cluster'],a:1,e:'This identity is key: pairwise distance formula = 2× sum of squared distances to centroid. This is why K-Means minimizes distances to centroids.'},
{q:'After one iteration of K-Means, no observation changed its cluster assignment. What happens next?',o:['The algorithm continues for 10 more iterations','The algorithm has converged and stops','The centroids are randomly re-initialized','The value of K is increased by 1'],a:1,e:'K-Means converges when no assignments change between iterations. The centroids and assignments are final.'},
{q:'Which clustering method does NOT require specifying the number of clusters in advance?',o:['K-Means','Hierarchical clustering','Both K-Means and hierarchical','Neither — both require K'],a:1,e:'Hierarchical clustering produces a dendrogram that shows all possible clusterings. K is chosen after by cutting at a height.'},
{q:'You want to apply K-Means and choose the best K. Which approach is correct?',o:['Always use K=3','Use K=n (one cluster per observation)','Run K-Means for K=2,3,...,10 and plot total WCV vs K (elbow method)','Use K equal to the number of features'],a:2,e:'The elbow method plots inertia (total WCV) vs K. The elbow where improvement slows suggests the appropriate K.'},
{q:'Which Python code correctly applies K-Means and retrieves cluster labels?',o:['km = KMeans(n_clusters=3)\nlabels = km.fit_predict(X)','km = KMeans(K=3)\nlabels = km.cluster(X)','km = KMeans(n_clusters=3)\nlabels = km.transform(X)','km = KMeans(n_clusters=3)\nlabels = km.fit(X).components_'],a:0,e:'KMeans uses n_clusters parameter. fit_predict() fits the model and returns cluster labels. transform() returns distances to centroids, not labels.'},
{q:'Points: A(0,0), B(1,0), C(10,0), D(11,0). K=2 with initial centroids at A and D. After one iteration, which is the correct assignment?',o:['C₁={A,B,C}, C₂={D}','C₁={A,B}, C₂={C,D}','C₁={A}, C₂={B,C,D}','C₁={A,B,C,D}'],a:1,e:'Centroid₁=(0,0), Centroid₂=(11,0). d(B,C₁)=1, d(B,C₂)=10→C₁. d(C,C₁)=10, d(C,C₂)=1→C₂. So C₁={A,B}, C₂={C,D}.'},
{q:'In K-Means, which of the following statements about the WCV identity is correct?',o:['Pairwise distance formula is half the sum of centroid distances','Pairwise distance formula equals twice the sum of squared distances to the centroid','Pairwise distance is unrelated to centroid distances','WCV uses Manhattan distance by default'],a:1,e:'(1/|Cₖ|) Σᵢ,ᵢ\' ||xᵢ−xᵢ\'||² = 2 Σᵢ∈Cₖ ||xᵢ−x̄ₖ||². This is why K-Means equivalently minimizes distances to centroids.'},
],
hierarchical:[
{q:'In hierarchical clustering with complete linkage, the distance between clusters {A,B} and {C,D} is defined as:',o:['The minimum of all pairwise distances between the two clusters','The maximum of all pairwise distances between the two clusters','The average of all pairwise distances','The distance between the centroids of the two clusters'],a:1,e:'Complete linkage = max pairwise distance. This produces compact, roughly spherical clusters.'},
{q:'Given d(A,B)=2, d(A,C)=8, d(B,C)=7. Using single linkage, what is d({A,B}, {C})?',o:['8','7','2','7.5'],a:1,e:'Single linkage = minimum distance. d({A,B},{C}) = min(d(A,C), d(B,C)) = min(8, 7) = 7.'},
{q:'A dendrogram shows observations P and Q merging at height 3.5, while R and S merge at height 8.2. Which pair is more similar?',o:['R and S because they merge at a higher height','P and Q because they merge at a lower height','Both pairs are equally similar','Cannot determine from a dendrogram'],a:1,e:'Lower fusion height = more similar observations. P and Q (height 3.5) are more similar than R and S (height 8.2).'},
{q:'Cutting a dendrogram at height h=5 produces 4 clusters. If you cut at h=3 instead, how many clusters would you get?',o:['Fewer than 4','Exactly 4','More than 4','Cannot determine'],a:2,e:'Lower cut height = more clusters (finer granularity). Cutting at h=3 < h=5 produces more clusters.'},
{q:'Which linkage type is most likely to produce long, chain-like clusters?',o:['Complete linkage','Ward linkage','Single linkage','Average linkage'],a:2,e:'Single linkage uses minimum distance, allowing "chaining" where one close pair links otherwise distant groups into elongated clusters.'},
{q:'Ward linkage minimizes which quantity when merging two clusters?',o:['The maximum pairwise distance','The minimum pairwise distance','The total within-cluster sum of squares (variance)','The average pairwise distance'],a:2,e:'Ward linkage merges the pair of clusters that results in the minimum increase in total within-cluster variance. Similar philosophy to K-Means.'},
{q:'Which statement correctly compares K-Means and hierarchical clustering?',o:['Both require specifying K in advance','K-Means is deterministic; hierarchical is not','Hierarchical clustering is deterministic for a given linkage; K-Means depends on random initialization','Both produce a dendrogram'],a:2,e:'Hierarchical is deterministic (same data + same linkage = same result). K-Means result depends on random initialization.'},
{q:'Which Python code correctly performs hierarchical clustering with complete linkage and cuts into 3 clusters?',o:['Z = linkage(X, method="single")\nclusters = fcluster(Z, t=3, criterion="maxclust")','Z = linkage(X, method="complete")\nclusters = fcluster(Z, t=3, criterion="maxclust")','Z = linkage(X, method="complete")\nclusters = fcluster(Z, t=3, criterion="distance")','km = KMeans(n_clusters=3).fit(X)'],a:1,e:'method="complete" for complete linkage. criterion="maxclust" with t=3 cuts into exactly 3 clusters. criterion="distance" would cut at height 3.'},
{q:'Given d(A,B)=3, d(A,C)=5, d(B,C)=4. Using complete linkage, d({A,B}, {C}) = ?',o:['3','4','5','4.5'],a:2,e:'Complete = max of all pairwise distances. d({A,B},{C}) = max(d(A,C), d(B,C)) = max(5, 4) = 5.'},
{q:'Using average linkage instead, d({A,B}, {C}) = ?',o:['3','4','5','4.5'],a:3,e:'Average = mean of all pairwise distances. d({A,B},{C}) = (d(A,C) + d(B,C))/2 = (5+4)/2 = 4.5.'},
{q:'In a dendrogram, observations X and Y merge at height 2, then {X,Y} merges with Z at height 10. Which pair is most similar?',o:['X and Z','Y and Z','X and Y','All equally similar'],a:2,e:'X and Y merge at height 2 (low = similar). The merge with Z at height 10 indicates Z is much less similar to {X,Y}.'},
],
nn:[
{q:'In a neural network, which activation function is most commonly used in the output layer for binary classification?',o:['ReLU','Tanh','Sigmoid','Softmax'],a:2,e:'Sigmoid outputs a value in (0,1), interpretable as a probability. For binary classification, threshold at 0.5.'},
{q:'Given inputs x₁=2, x₂=3, weights w₁=0.4, w₂=−0.2, bias b=0.5. What is z?',o:['1.3','0.3','0.7','−0.3'],a:2,e:'z = 0.4(2) + (−0.2)(3) + 0.5 = 0.8 − 0.6 + 0.5 = 0.7.'},
{q:'Which of the following statements about the "dying ReLU" problem is correct?',o:['ReLU neurons explode to infinity and cause numerical overflow','ReLU neurons can get permanently stuck outputting zero if they always receive negative inputs','ReLU is too computationally expensive for deep networks','Dying ReLU only occurs in the output layer'],a:1,e:'If weights cause z to always be negative, ReLU always outputs 0 and its gradient is 0, so the neuron never updates — permanently "dead."'},
{q:'Which activation function converts a vector of raw scores into a probability distribution that sums to 1?',o:['Sigmoid','Tanh','ReLU','Softmax'],a:3,e:'Softmax: g(zₖ) = eᶻᵏ/Σeᶻʲ. Each output is in (0,1) and all outputs sum to 1. Used for multi-class classification.'},
{q:'Backpropagation uses which mathematical technique to compute gradients?',o:['The product rule','The quotient rule','The chain rule','Integration by parts'],a:2,e:'Backpropagation applies the chain rule: ∂Loss/∂w = ∂Loss/∂ŷ · ∂ŷ/∂z · ∂z/∂w, propagating gradients layer by layer.'},
{q:'Why is the tanh function often preferred over sigmoid in hidden layers?',o:['Tanh is computationally cheaper','Tanh outputs are zero-centered, which helps optimization converge faster','Tanh completely eliminates the vanishing gradient problem','Tanh has a larger output range (−∞, ∞)'],a:1,e:'Tanh is zero-centered (outputs between −1 and 1), preventing systematic gradient bias. Sigmoid outputs are always positive (0 to 1), which can slow optimization.'},
{q:'A neural network with one hidden layer and sigmoid activations can solve:',o:['Only linearly separable problems','Any classification problem given enough neurons','Only regression problems','Only problems with fewer than 10 features'],a:1,e:'A single hidden layer with enough neurons is a universal function approximator (can approximate any continuous function). Multiple layers are needed for efficiency, not capability.'},
{q:'In the following network, what is the output?\nInputs: x₁=1, x₂=0. Weights to hidden: w₁=1, w₂=1. Bias=0. Activation: ReLU.\nWeight to output: w=2. Output bias=−1. Output activation: none.',o:['1','3','−1','2'],a:0,e:'Hidden: z=1(1)+1(0)+0=1, ReLU(1)=1. Output: 2(1)+(−1)=1. Answer: 1.'},
{q:'Which of the following correctly describes the relationship between neural network depth and learning capability?',o:['Deeper networks can only solve linear problems','Deeper networks can learn hierarchical features (edges → shapes → objects)','Depth has no effect on learning capability','Deeper networks always have lower training error'],a:1,e:'Each layer extracts increasingly abstract features. Early layers detect edges, middle layers detect shapes, deep layers detect complex objects.'},
{q:'Which Python code creates a simple neural network for binary classification?',o:['MLPClassifier(hidden_layer_sizes=(10,), activation="relu")','LinearRegression()','KMeans(n_clusters=2)','PCA(n_components=2)'],a:0,e:'MLPClassifier from sklearn creates a multi-layer perceptron. hidden_layer_sizes=(10,) = one hidden layer with 10 neurons.'},
{q:'A neuron has weights w=[0.5, -0.3], bias b=0.1, input x=[2, 4], and uses ReLU activation. What is the output?',o:['0','0.1','-0.1','-1.1'],a:0,e:'z = 0.5(2) + (-0.3)(4) + 0.1 = 1.0 - 1.2 + 0.1 = -0.1. ReLU(-0.1) = max(0, -0.1) = 0.'},
{q:'A network has 3 input neurons, 2 hidden layers with 5 and 3 neurons respectively, and 1 output neuron. How many weight connections are there (excluding biases)?',o:['15 + 15 + 3 = 33','3×5 + 5×3 + 3×1 = 33','3+5+3+1 = 12','15 + 15 = 30'],a:1,e:'Layer 1→2: 3×5=15 weights. Layer 2→3: 5×3=15 weights. Layer 3→output: 3×1=3 weights. Total = 33.'},
{q:'You want to classify images of handwritten digits (0-9). Which output layer setup is correct?',o:['1 neuron with sigmoid activation','10 neurons with sigmoid activation','10 neurons with softmax activation','1 neuron with ReLU activation'],a:2,e:'10 classes → 10 output neurons. Softmax ensures outputs sum to 1 (probabilities over classes). Sigmoid is for binary, not multi-class.'},
{q:'Which statement about MLPClassifier is correct?',o:['hidden_layer_sizes=(100,50) creates 2 hidden layers with 100 and 50 neurons','hidden_layer_sizes=(100,50) creates 1 hidden layer with 150 neurons','MLPClassifier cannot use ReLU activation','MLPClassifier requires manually implementing backpropagation'],a:0,e:'The tuple (100,50) specifies 2 layers: first with 100 neurons, second with 50. sklearn handles backpropagation automatically.'},
{q:'If sigmoid(1.0) ≈ 0.731, what is sigmoid(-1.0)?',o:['0.731','-0.731','0.269','0.5'],a:2,e:'sigmoid(-z) = 1 - sigmoid(z). So sigmoid(-1.0) = 1 - 0.731 = 0.269. This symmetry property is key.'},
{q:'A neural network with NO activation functions (identity only) is equivalent to:',o:['A deep learning model','A linear regression model','A non-linear classifier','A decision tree'],a:1,e:'Without non-linear activations, stacking linear layers collapses to a single linear transformation: W₃(W₂(W₁x)) = Wx. This is just linear regression.'},
{q:'Which of the following is NOT a technique to prevent overfitting in neural networks?',o:['Dropout','Early stopping','Weight decay (L2 regularization)','Increasing the number of hidden layers and neurons'],a:3,e:'Increasing capacity (more layers/neurons) makes overfitting WORSE. Dropout, early stopping, and weight decay all help prevent it.'},
],
svm:[
{q:'Which of the following statements about SVMs is correct?',o:['SVMs adopt a statistical approach like logistic regression','SVMs perform well when the number of features exceeds the number of observations (p > n)','SVMs can only handle linearly separable data','SVMs always produce probability estimates'],a:1,e:'SVMs use a geometric (not statistical) approach. They excel when p > n (e.g., gene expression with thousands of features, few samples).'},
{q:'In a soft-margin SVM, the constraint yᵢ(β₀ + βᵀxᵢ) ≥ 1 − ξᵢ holds. If 0 < ξᵢ < 1, what is the status of observation i?',o:['Correctly classified and outside the margin','Inside the margin but on the correct side of the hyperplane','Misclassified (on the wrong side)','Exactly on the hyperplane'],a:1,e:'0 < ξ < 1 means the point is correctly classified but lies inside the margin — a margin violator but not misclassified. ξ > 1 means misclassified.'},
{q:'The hyperplane is 3X₁ + 4X₂ − 12 = 0. What is the perpendicular distance from point (2, 1) to this hyperplane?',o:['0.2','0.4','1.0','2.0'],a:1,e:'||β|| = √(9+16) = 5. d = |3(2) + 4(1) − 12| / 5 = |6+4−12|/5 = |−2|/5 = 2/5 = 0.4.'},
{q:'Which kernel should you try first if you have a dataset with 5000 features and 200 observations?',o:['RBF kernel','Polynomial kernel (degree 5)','Linear kernel','No kernel is suitable'],a:2,e:'When p >> n, a linear kernel often suffices because the data is already in a high-dimensional space. Linear is also much faster than nonlinear kernels.'},
{q:'Increasing the regularization parameter C in a soft-margin SVM will:',o:['Allow more margin violations and create a wider margin','Penalize violations more heavily, creating a narrower margin with fewer violations','Have no effect on the margin width','Always improve test accuracy'],a:1,e:'Larger C = heavier penalty for slack variables = fewer violations tolerated = narrower margin. This decreases bias but increases variance.'},
{q:'The RBF kernel K(xᵢ,xⱼ) = exp(−γ||xᵢ−xⱼ||²) with γ=0.5. For ||xᵢ−xⱼ||²=6, what is K?',o:['e⁻³ ≈ 0.050','e⁻⁶ ≈ 0.002','e⁻⁰·⁵ ≈ 0.607','e⁻¹² ≈ 0.000006'],a:0,e:'K = exp(−0.5 × 6) = exp(−3) ≈ 0.050. The kernel measures similarity; this relatively low value indicates moderate distance.'},
{q:'For a classification problem with 6 classes using One-vs-One (OVO), how many binary classifiers are needed?',o:['6','12','15','30'],a:2,e:'OVO requires K(K−1)/2 = 6(5)/2 = 15 classifiers. Each classifier handles one pair of classes.'},
{q:'Which of the following Python code applies an SVM with RBF kernel?',o:['SVC(kernel="linear")','SVC(kernel="rbf", gamma=0.5, C=1.0)','LinearSVC()','SVR(kernel="poly")'],a:1,e:'SVC with kernel="rbf" applies the radial basis function kernel. gamma and C are the key hyperparameters.'},
{q:'A trained SVM produces f(x)=−0.3 for an observation with true label y=+1. What is yᵢf(xᵢ) and what does it mean?',o:['0.3 — correctly classified outside margin','−0.3 — the observation is misclassified (ξ = 1.3)','0.3 — inside margin but correct','−0.3 — on the boundary'],a:1,e:'yᵢf(xᵢ) = (+1)(−0.3) = −0.3 < 0, which means misclassified (wrong side). ξ = 1 − (−0.3) = 1.3 > 1 confirms misclassification.'},
{q:'Which of the following correctly describes the kernel trick?',o:['It speeds up SVM training by reducing the number of support vectors','It computes inner products in a high-dimensional feature space without explicitly transforming the data','It converts an SVM into a logistic regression model','It reduces the number of features using PCA before applying SVM'],a:1,e:'The kernel trick replaces inner products xᵢᵀxⱼ with K(xᵢ,xⱼ) — computing similarity in high-dimensional space implicitly, enabling nonlinear boundaries efficiently.'},
{q:'In a 2D feature space, the decision boundary of an SVM with a linear kernel is:',o:['A circle','A parabola','A line','A point'],a:2,e:'In p=2 dimensions, a hyperplane is a (p−1)=1 dimensional subspace, which is a line.'},
{q:'Scaling β by a constant c > 0 (replacing β with cβ and β₀ with cβ₀) affects the geometric margin how?',o:['The margin doubles','The margin halves','The geometric margin is unchanged (scale-invariant)','The margin depends on c²'],a:2,e:'Geometric distance d = |f(x)|/||β|| = |cf(x)|/||cβ|| = c|f(x)|/(c||β||) = |f(x)|/||β||. Scale cancels out. This is why we fix ||β||=1.'},
{q:'You have gene expression data with 2308 features and 63 observations. Which classifier is most appropriate?',o:['Naive Bayes — it handles high dimensions well','Logistic Regression with default settings','LinearSVC — SVM excels when p >> n','KNeighborsClassifier with k=5'],a:2,e:'When p >> n (2308 >> 63), SVM (especially linear) performs well because it does not adopt a statistical approach. The lecture showed LinearSVC achieved 100% accuracy on this dataset.'},
{q:'You want to compare SVM kernels. Choose the correct Python code to fit an RBF kernel SVM and evaluate accuracy.',o:['model = LinearSVC()\nmodel.fit(X_train, y_train)\nprint(accuracy_score(y_test, model.predict(X_test)))','model = SVC(kernel="rbf", gamma=0.5)\nmodel.fit(X_train, y_train)\nprint(accuracy_score(y_test, model.predict(X_test)))','model = SVC(kernel="rbf")\nmodel.fit_transform(X_train, y_train)','model = SVR(kernel="rbf")\nmodel.fit(X_train, y_train)\nprint(model.score(X_test, y_test))'],a:1,e:'SVC with kernel="rbf" for classification. SVR is for regression. LinearSVC only does linear. fit_transform is not a method of SVC.'},
{q:'You need to classify 4 tumor types using SVM. Which Python code correctly implements One-vs-Rest multiclass?',o:['OneVsRestClassifier(LinearSVC()).fit(X_train, y_train)','OneVsOneClassifier(LinearSVC()).fit(X_train, y_train)','LinearSVC(multi_class="ovr").fit(X_train, y_train)','SVC(kernel="linear").fit(X_train, y_train)'],a:0,e:'OneVsRestClassifier wraps any binary classifier to handle multiclass via OVR strategy. Note: sklearn SVC already does OVO internally by default.'},
{q:'A dataset has two features and the classes form concentric circles (one class inside, one outside). Which SVM approach is best?',o:['Linear SVM — a line can always separate 2D data','SVM with polynomial kernel (degree 1)','SVM with RBF kernel','Increase C until the linear SVM works'],a:2,e:'Concentric circles cannot be separated by any line (linear boundary). RBF kernel maps to infinite dimensions where a linear separator can be found, producing a circular boundary in original space.'},
{q:'The hyperplane is X₁ − 2X₂ + 3 = 0. Point (1, 4) has true label y = −1. Is it correctly classified?',o:['Yes — f(x) = −4 < 0 and y = −1, so yf(x) > 0','No — f(x) = −4 < 0 but y = −1 means misclassified','Cannot determine without C','The point is on the hyperplane'],a:0,e:'f(1,4) = 1 − 2(4) + 3 = 1 − 8 + 3 = −4. Since y = −1 and f(x) = −4 < 0, yf(x) = (−1)(−4) = 4 > 0. Correctly classified, outside margin.'},
{q:'In OVO multiclass SVM with K=4 classes, how many pairwise classifiers are trained?',o:['4','6','8','16'],a:1,e:'OVO: K(K−1)/2 = 4(3)/2 = 6 classifiers. Each handles one pair: (1v2), (1v3), (1v4), (2v3), (2v4), (3v4).'},

{title:'PA-Q1: Neural Network Forward Propagation',topic:'nn',points:20,parts:[
{label:'Part (a) — Forward Propagation [12 pts]',q:'<p>A neural network has the following architecture and parameters:</p><table class="tbl"><tr><th colspan="2">Network</th></tr><tr><td>Input</td><td>2 neurons (x₁, x₂)</td></tr><tr><td>Hidden</td><td>2 neurons, <b>sigmoid</b></td></tr><tr><td>Output</td><td>1 neuron, <b>sigmoid</b></td></tr></table><table class="tbl"><tr><th>Parameter</th><th>Value</th></tr><tr><td>w₁₁ (x₁→h₁)</td><td>0.4</td></tr><tr><td>w₂₁ (x₂→h₁)</td><td>−0.6</td></tr><tr><td>w₁₂ (x₁→h₂)</td><td>0.3</td></tr><tr><td>w₂₂ (x₂→h₂)</td><td>0.8</td></tr><tr><td>b<sub>hidden</sub></td><td>0.1</td></tr><tr><td>v₁ (h₁→out)</td><td>1.0</td></tr><tr><td>v₂ (h₂→out)</td><td>−0.5</td></tr><tr><td>b<sub>output</sub></td><td>0.2</td></tr></table><p>Given <b>x₁ = 2, x₂ = 1</b>, compute ŷ. Show all intermediate z and h values.</p><p><em>Use: σ(0.3)=0.574, σ(0.5)=0.622, σ(1.0)=0.731, σ(1.5)=0.818, σ(−0.2)=0.450, σ(0.37)=0.591</em></p>',a:'Hidden neuron h₁:\n  z₁ = 0.4(2) + (−0.6)(1) + 0.1 = 0.8 − 0.6 + 0.1 = 0.3\n  h₁ = σ(0.3) = 0.574\n\nHidden neuron h₂:\n  z₂ = 0.3(2) + 0.8(1) + 0.1 = 0.6 + 0.8 + 0.1 = 1.5\n  h₂ = σ(1.5) = 0.818\n\nOutput:\n  z₃ = 1.0(0.574) + (−0.5)(0.818) + 0.2\n     = 0.574 − 0.409 + 0.2 = 0.365\n  ŷ = σ(0.365) ≈ 0.590\n\nFinal output: ŷ ≈ 0.590'},
{label:'Part (b) — Activation Functions [4 pts]',q:'<p>For each scenario, name the best activation function and give one reason.</p><table class="tbl"><tr><th>#</th><th>Scenario</th></tr><tr><td>i</td><td>Output layer: spam vs not-spam</td></tr><tr><td>ii</td><td>Output layer: classifying digits 0–9</td></tr><tr><td>iii</td><td>Hidden layers in a 50-layer network</td></tr><tr><td>iv</td><td>Hidden layer with many permanently-zero neurons</td></tr></table>',a:'i) Sigmoid — output in (0,1), interpretable as probability for binary classification.\nii) Softmax — 10 outputs summing to 1, each = P(class k).\niii) ReLU — gradient=1 for z>0, prevents vanishing gradient in deep nets.\niv) Leaky ReLU — allows gradient=0.1 for z<0, reviving "dead" neurons.'},

{title:'PA-Q2: PCA Computation',topic:'pca',points:20,parts:[
{label:'Part (a) — Center & Covariance [6 pts]',q:'<p>A factory monitors two sensors:</p><table class="tbl"><tr><th>Obs</th><th>Temp (X₁)</th><th>Vibration (X₂)</th></tr><tr><td>1</td><td>4</td><td>2</td></tr><tr><td>2</td><td>6</td><td>4</td></tr><tr><td>3</td><td>8</td><td>6</td></tr><tr><td>4</td><td>10</td><td>8</td></tr></table><ol><li>Compute the mean of each feature.</li><li>Center the data (subtract means).</li><li>Compute the covariance matrix Σ using <b>1/n</b>.</li></ol>',a:'1) Means: X̄₁ = (4+6+8+10)/4 = 7,  X̄₂ = (2+4+6+8)/4 = 5\n\n2) Centered:\n  Obs 1: (−3, −3)    Obs 2: (−1, −1)\n  Obs 3: ( 1,  1)    Obs 4: ( 3,  3)\n\n3) Covariance (1/n):\n  Var(X₁) = (9+1+1+9)/4 = 5.0\n  Var(X₂) = (9+1+1+9)/4 = 5.0\n  Cov     = (9+1+1+9)/4 = 5.0\n\n  Σ = | 5  5 |\n      | 5  5 |'},
{label:'Part (b) — Eigenvalues & Eigenvectors [6 pts]',q:'<ol><li>Find eigenvalues by solving det(Σ − λI) = 0.</li><li>Find the normalized eigenvector for the largest eigenvalue.</li><li>Write PC1 as a linear combination of X₁ and X₂.</li></ol>',a:'1) det(Σ−λI) = (5−λ)² − 25 = λ² − 10λ = λ(λ−10) = 0\n   λ₁ = 10,  λ₂ = 0\n\n2) For λ₁=10:  −5v₁ + 5v₂ = 0 → v₂ = v₁\n   v = (1,1), ||v|| = √2\n   φ₁ = (1/√2, 1/√2)\n\n3) PC1 = (1/√2)X₁ + (1/√2)X₂'},
{label:'Part (c) — PVE [4 pts]',q:'<ol><li>Compute PVE for each component.</li><li>How many PCs for ≥ 95% variance?</li><li>What does λ₂ = 0 mean about the features?</li></ol>',a:'1) PVE₁ = 10/10 = 100%,  PVE₂ = 0/10 = 0%\n\n2) Just 1 PC captures everything.\n\n3) λ₂ = 0 means zero variance in the orthogonal direction. Temp and Vibration are perfectly correlated — the data is 1-dimensional. Vibration is fully redundant.'},
{label:'Part (d) — Projections [4 pts]',q:'<p>Project all 4 centered observations onto PC1. Then interpret what a high PC1 score means for the factory.</p>',a:'zᵢ = (1/√2)(x₁ᵢ + x₂ᵢ)  using centered values:\n\n  z₁ = (−3−3)/√2 = −6/√2 ≈ −4.24\n  z₂ = (−1−1)/√2 = −2/√2 ≈ −1.41\n  z₃ = ( 1+1)/√2 =  2/√2 ≈  1.41\n  z₄ = ( 3+3)/√2 =  6/√2 ≈  4.24\n\nHigh PC1 = both temp and vibration are elevated. Represents overall "process intensity."'}
]},
{title:'PA-Q3: K-Means Clustering',topic:'kmeans',points:20,parts:[
{label:'Part (a) — Centroids [5 pts]',q:'<p>Segment customers by two features. K=2.</p><table class="tbl"><tr><th>Customer</th><th>Spending (X₁)</th><th>Visits (X₂)</th></tr><tr><td>A</td><td>2</td><td>8</td></tr><tr><td>B</td><td>3</td><td>6</td></tr><tr><td>C</td><td>7</td><td>3</td></tr><tr><td>D</td><td>8</td><td>2</td></tr><tr><td>E</td><td>5</td><td>5</td></tr></table><p>Initial: <b>C₁ = {A,B,E}</b>, <b>C₂ = {C,D}</b>. Compute centroids.</p>',a:'μ₁ = ((2+3+5)/3, (8+6+5)/3) = (3.33, 6.33)\nμ₂ = ((7+8)/2, (3+2)/2) = (7.50, 2.50)'},
{label:'Part (b) — Reassignment [8 pts]',q:'<p>Compute distances from each customer to both centroids. Fill in the table.</p><table class="tbl"><tr><th>Customer</th><th>d(·, μ₁)</th><th>d(·, μ₂)</th><th>Assign</th></tr><tr><td>A (2,8)</td><td>?</td><td>?</td><td>?</td></tr><tr><td>B (3,6)</td><td>?</td><td>?</td><td>?</td></tr><tr><td>C (7,3)</td><td>?</td><td>?</td><td>?</td></tr><tr><td>D (8,2)</td><td>?</td><td>?</td><td>?</td></tr><tr><td>E (5,5)</td><td>?</td><td>?</td><td>?</td></tr></table><p>Has the algorithm converged?</p>',a:'Customer   d(·,μ₁)   d(·,μ₂)   Assign\nA (2,8)    2.14      7.78      C₁ ✓\nB (3,6)    0.47      5.70      C₁ ✓\nC (7,3)    4.96      0.71      C₂ ✓\nD (8,2)    6.37      0.71      C₂ ✓\nE (5,5)    2.14      3.54      C₁ ✓\n\nSample: d(A,μ₁)=√((2−3.33)²+(8−6.33)²)=√4.57≈2.14\n\nNo changes → CONVERGED.'},
{label:'Part (c) — WCV [4 pts]',q:'<p>Compute total WCV = Σₖ Σᵢ∈Cₖ ||xᵢ − μₖ||². Show each cluster separately.</p>',a:'C₁ {A,B,E}, μ₁=(3.33,6.33):\n  ||A−μ₁||²=4.57, ||B−μ₁||²=0.22, ||E−μ₁||²=4.56\n  WCV₁ = 9.35\n\nC₂ {C,D}, μ₂=(7.5,2.5):\n  ||C−μ₂||²=0.50, ||D−μ₂||²=0.50\n  WCV₂ = 1.00\n\nTotal WCV = 9.35 + 1.00 = 10.35'},
{label:'Part (d) — Interpretation [3 pts]',q:'<ol><li>Describe clusters in business terms.</li><li>New customer: Spending=6, Visits=7. Which cluster?</li><li>Why run K-Means multiple times?</li></ol>',a:'1) C₁: "Frequent visitors" (low spend, high visits)\n   C₂: "Big spenders" (high spend, low visits)\n\n2) d(new,μ₁)=√((6−3.33)²+(7−6.33)²)=√7.58≈2.75\n   d(new,μ₂)=√((6−7.5)²+(7−2.5)²)=√22.5≈4.74\n   → C₁ (Frequent visitors)\n\n3) K-Means finds only a LOCAL minimum. Different random starts → different results. Keep the run with lowest WCV.'}
]},
{title:'PA-Q4: Support Vector Machines',topic:'svm',points:20,parts:[
{label:'Part (a) — Hyperplane Classification [6 pts]',q:'<p>Hyperplane: <b>f(x) = 2X₁ − X₂ + 1</b></p><table class="tbl"><tr><th>Obs</th><th>X₁</th><th>X₂</th><th>True y</th></tr><tr><td>1</td><td>1</td><td>4</td><td>+1</td></tr><tr><td>2</td><td>3</td><td>2</td><td>+1</td></tr><tr><td>3</td><td>2</td><td>7</td><td>−1</td></tr><tr><td>4</td><td>4</td><td>5</td><td>−1</td></tr></table><ol><li>Compute f(x) for each point.</li><li>Which are correctly classified? (Predict +1 if f>0, −1 if f<0)</li><li>Compute perpendicular distance d = |f(x)|/||β||.</li></ol>',a:'||β|| = √(4+1) = √5\n\n1) f values:\n  f(1,4) = 2−4+1 = −1\n  f(3,2) = 6−2+1 = 5\n  f(2,7) = 4−7+1 = −2\n  f(4,5) = 8−5+1 = 4\n\n2) Obs 1: f=−1→pred −1, true +1 → WRONG ✗\n   Obs 2: f=5→pred +1, true +1 → correct ✓\n   Obs 3: f=−2→pred −1, true −1 → correct ✓\n   Obs 4: f=4→pred +1, true −1 → WRONG ✗\n\n3) d₁=1/√5≈0.447  d₂=5/√5≈2.236\n   d₃=2/√5≈0.894  d₄=4/√5≈1.789'},
{label:'Part (b) — Slack Variables [6 pts]',q:'<p>A trained SVM gives:</p><table class="tbl"><tr><th>Obs</th><th>yᵢ</th><th>f(xᵢ)</th><th>yᵢf(xᵢ)</th><th>Status</th><th>ξᵢ</th></tr><tr><td>1</td><td>+1</td><td>0.4</td><td style="color:var(--text3)">?</td><td style="color:var(--text3)">?</td><td style="color:var(--text3)">?</td></tr><tr><td>2</td><td>+1</td><td>1.5</td><td style="color:var(--text3)">?</td><td style="color:var(--text3)">?</td><td style="color:var(--text3)">?</td></tr><tr><td>3</td><td>−1</td><td>−2.0</td><td style="color:var(--text3)">?</td><td style="color:var(--text3)">?</td><td style="color:var(--text3)">?</td></tr><tr><td>4</td><td>−1</td><td>0.3</td><td style="color:var(--text3)">?</td><td style="color:var(--text3)">?</td><td style="color:var(--text3)">?</td></tr></table><p>Fill in. Use ξᵢ = max(0, 1−yᵢf(xᵢ)).<br/>yf > 1: outside margin. 0 < yf < 1: inside margin. yf < 0: misclassified.</p>',a:'Obs  yf      Status              ξ\n1    0.4    inside margin       0.6\n2    1.5    outside margin      0\n3    2.0    outside margin      0\n4   −0.3    MISCLASSIFIED       1.3\n\nξ₄=1.3 > 1 confirms misclassification.\nξ₁=0.6 ∈ (0,1): margin violator, correct side.'},
{label:'Part (c) — RBF Kernel [4 pts]',q:'<p>K(xᵢ,xⱼ) = exp(−γ||xᵢ−xⱼ||²), γ = 0.25</p><table class="tbl"><tr><th>Point</th><th>Coordinates</th></tr><tr><td>x₁</td><td>(1, 2)</td></tr><tr><td>x₂</td><td>(4, 6)</td></tr><tr><td>x₃</td><td>(2, 3)</td></tr></table><ol><li>Compute K(x₁,x₂).</li><li>Compute K(x₁,x₃).</li><li>Which pair is more similar?</li></ol>',a:'1) ||x₁−x₂||²=(1−4)²+(2−6)²=9+16=25\n   K(x₁,x₂)=exp(−0.25×25)=exp(−6.25)≈0.002\n\n2) ||x₁−x₃||²=(1−2)²+(2−3)²=1+1=2\n   K(x₁,x₃)=exp(−0.25×2)=exp(−0.5)≈0.607\n\n3) x₁ & x₃ are far more similar (K≈0.607 vs 0.002).\n   K=1: identical. K→0: very far apart.'},
{label:'Part (d) — Multiclass & C [4 pts]',q:'<ol><li>For 5 classes: how many classifiers for OVR? OVO?</li><li>As C increases, what happens to margin width and bias-variance?</li><li>When should you prefer SVM over logistic regression?</li></ol>',a:'1) OVR: 5.  OVO: 5(4)/2 = 10.\n\n2) ↑C → narrower margin, fewer violations.\n   Bias ↓ (closer fit), Variance ↑ (more sensitive).\n   C=∞ → hard margin.\n\n3) SVM preferred when:\n   • Classes nearly separable\n   • p > n (high-dimensional, few observations)\n   • Nonlinear boundaries needed (kernel trick)\n   • Probability estimates not required'}
]},
{title:'PA-Q5: Hierarchical Clustering',topic:'hierarchical',points:20,parts:[
{label:'Part (a) — Distance Matrix [5 pts]',q:'<p>Cluster 4 warehouses by location:</p><table class="tbl"><tr><th>Warehouse</th><th>X</th><th>Y</th></tr><tr><td>W1</td><td>1</td><td>2</td></tr><tr><td>W2</td><td>3</td><td>4</td></tr><tr><td>W3</td><td>8</td><td>7</td></tr><tr><td>W4</td><td>10</td><td>9</td></tr></table><p>Compute all 6 pairwise Euclidean distances. Present as a matrix.</p>',a:'d(W1,W2)=√(4+4)=2√2≈2.83\nd(W1,W3)=√(49+25)=√74≈8.60\nd(W1,W4)=√(81+49)=√130≈11.40\nd(W2,W3)=√(25+9)=√34≈5.83\nd(W2,W4)=√(49+25)=√74≈8.60\nd(W3,W4)=√(4+4)=2√2≈2.83\n\n       W1    W2    W3    W4\nW1    —     2.83  8.60  11.40\nW2          —     5.83   8.60\nW3                —      2.83\nW4                       —'},
{label:'Part (b) — Complete Linkage [6 pts]',q:'<p>Perform agglomerative clustering with <b>complete linkage</b>. For each step state: which clusters merge, at what height, and update distances.</p>',a:'Step 1: Min distances = d(W1,W2)=d(W3,W4)=2.83\n  Merge {W1,W2} at h=2.83\n  Merge {W3,W4} at h=2.83\n\nStep 2: Complete linkage between remaining:\n  d({W1,W2},{W3,W4}) = max(8.60, 11.40, 5.83, 8.60) = 11.40\n  Merge at h=11.40\n\nSequence: 2.83 → 2.83 → 11.40'},
{label:'Part (c) — Dendrogram & Cutting [4 pts]',q:'<ol><li>Sketch the dendrogram.</li><li>Cut at h=5 → how many clusters? List them.</li><li>Cut at h=1 → how many clusters?</li></ol>',a:'1) Dendrogram:\n   h=11.40  ______|______\n           |            |\n   h=2.83  |__    |     |__\n          |    |       |    |\n          W1  W2      W3  W4\n\n2) h=5: 2 clusters → {W1,W2} and {W3,W4}\n   (cross-merge at 11.40 > 5)\n\n3) h=1: 4 clusters (no merge < 1)'},
{label:'Part (d) — Linkage Comparison [5 pts]',q:'<ol><li>Compute d<sub>single</sub>({W1,W2},{W3,W4}). Compare with complete.</li><li>Why does single linkage produce "chaining"?</li><li>Would K-Means (K=2) give the same clusters?</li></ol>',a:'1) d_single = min(8.60,11.40,5.83,8.60) = 5.83\n   vs complete = 11.40. Single merges earlier.\n\n2) Single uses only the closest pair. If points form a chain where each neighbor is close but endpoints are far, single merges the whole chain — producing elongated, non-compact clusters.\n\n3) Yes — K-Means would almost certainly produce {W1,W2} and {W3,W4}. The two pairs are tightly clustered (d=2.83) and well-separated (d≥5.83). Both methods identify this structure, but hierarchical also shows the internal structure via the dendrogram.'}
]}
];
