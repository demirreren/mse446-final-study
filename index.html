<script>
const TOPICS=[
{id:'pca',name:'PCA',full:'Principal Component Analysis'},
{id:'kmeans',name:'K-Means',full:'K-Means Clustering'},
{id:'hierarchical',name:'Hierarchical',full:'Hierarchical Clustering'},

const GUIDE={
pca:`<h2>Principal Component Analysis (PCA)</h2>
<h3>What is PCA?</h3>
<p>PCA is a <strong>dimensionality reduction</strong> method that produces a low-dimensional representation of a dataset. It finds <strong>linear combinations</strong> of variables with <strong>maximal variance</strong> that are <strong>mutually uncorrelated</strong>.</p>
<div class="exam-callout">PCA looks for directions of <strong>maximum variance</strong>. Clustering looks for <strong>homogeneous subgroups</strong>. Know the difference.</div>
<h3>First Principal Component</h3>
<pre class="code-block">Z₁ = φ₁₁X₁ + φ₂₁X₂ + ... + φₚ₁Xₚ

subject to: Σ φⱼ₁² = 1  (normalization constraint)

• Loadings φ₁₁,...,φₚ₁ define the direction of maximum variance
• Scores z_i1 are the projections onto this direction
• Solved via eigenvalue decomposition of the covariance matrix</pre>
<h3>Further Principal Components</h3>
<ul>
<li>PC2 maximizes variance among all directions <strong>orthogonal to PC1</strong></li>
<li>Uncorrelated with Z₁ ⇔ direction φ₂ is <strong>perpendicular</strong> to φ₁</li>
<li>Max PCs = <strong>min(n−1, p)</strong></li>
</ul>
<div class="diagram">     PC2 (less variance)
      ↑
      |     · ·
      |   ·  ╱  ·        PC1 direction (most variance)
      |  · ╱     ·       ──────→
      | ·╱    ·
      |╱ ·  ·
──────┼──────────→ PC1
      |
   PCA rotates axes to maximize
   variance along PC1, then PC2, etc.</div>
<h3>Step-by-Step PCA Process</h3>
<ol>
<li><strong>Standardize</strong> — PCA is variance-sensitive. Scale so each feature has mean=0, std=1.</li>
<li><strong>Covariance matrix</strong> — Compute relationships between variables.</li>
<li><strong>Eigenvalues & eigenvectors</strong> — Eigenvalues = variance per PC. Eigenvectors = loading directions.</li>
<li><strong>Choose # PCs</strong> — Use PVE and scree plot (look for "elbow").</li>
<li><strong>Project data</strong> — Multiply original data by the feature vector.</li>
</ol>
<h3>Proportion of Variance Explained (PVE)</h3>
<pre class="code-block">PVEₘ = λₘ / Σλⱼ  =  Var(Zₘ) / Total Variance

• PVE is between 0 and 1
• All PVEs sum to 1
• Scree plot: PVE vs component number — look for "elbow"</pre>
<div class="exam-callout">PVE = eigenvalue / sum of ALL eigenvalues. Cumulative PVE tells you total variance captured by first m components.</div>
<h3>Worked Example: PCA Computation</h3>
<pre class="code-block">Data: (2,3), (3,4), (4,5)  — 3 obs, 2 features

Step 1: Center (subtract means: X̄₁=3, X̄₂=4)
  Centered: (-1,-1), (0,0), (1,1)

Step 2: Covariance matrix (1/n)
  Var(X₁) = (1+0+1)/3 = 2/3
  Var(X₂) = (1+0+1)/3 = 2/3
  Cov = (1+0+1)/3 = 2/3
  Σ = [[2/3, 2/3], [2/3, 2/3]]

Step 3: Eigenvalues
  det(Σ − λI) = (2/3−λ)² − (2/3)² = 0
  λ₁ = 4/3,  λ₂ = 0

Step 4: PVE
  PVE₁ = (4/3)/(4/3) = 100%  ← perfect correlation!

Step 5: Eigenvector for λ₁
  φ₁ = (1/√2, 1/√2)
  PC1 = (1/√2)(X₁ + X₂)</pre>
<h3>Worked Example: Route Optimization</h3>
<pre class="code-block">Given: Z₁ = 0.6X₁ + 0.6X₂ + 0.529X₃
Eigenvalues: λ₁=5.5, λ₂=1.2, λ₃=0.3

Total variance = 5.5 + 1.2 + 0.3 = 7.0
PVE₁ = 5.5/7.0 = 78.6%
PVE₂ = 1.2/7.0 = 17.1%
PVE₃ = 0.3/7.0 = 4.3%
Cumulative (PC1+PC2) = 95.7% → retain 2 components</pre>
<h3>Python</h3>
<pre class="code-block">from sklearn.preprocessing import StandardScaler
from sklearn.decomposition import PCA

scaler = StandardScaler()
X_scaled = scaler.fit_transform(X)

pca = PCA(n_components=2)
X_pca = pca.fit_transform(X_scaled)

pca.explained_variance_ratio_  # PVE per component
pca.components_                # loading vectors</pre>
<div class="warning-callout">Always standardize before PCA unless told otherwise. Different scales → different PCs. The intercept is not meaningful in PCA.</div>`,

kmeans:`<h2>K-Means Clustering</h2>
<h3>Core Idea</h3>
<p>K-means partitions n observations into K clusters by minimizing <strong>within-cluster variation (WCV)</strong>. You must specify K in advance.</p>
<h3>Mathematical Formulation</h3>
<pre class="code-block">Objective: min  Σₖ WCV(Cₖ)

WCV(Cₖ) = (1/|Cₖ|) Σᵢ,ᵢ'∈Cₖ Σⱼ (xᵢⱼ − xᵢ'ⱼ)²

Equivalent: WCV(Cₖ) = 2 Σᵢ∈Cₖ ||xᵢ − x̄ₖ||²

Two properties:
1. C₁ ∪ C₂ ∪ ... ∪ Cₖ = {1,...,n}  (every obs in a cluster)
2. Cₖ ∩ Cₖ' = ∅ for k ≠ k'       (non-overlapping)</pre>
<h3>Algorithm</h3>
<ol>
<li><strong>Initialize:</strong> Randomly assign each observation to one of K clusters</li>
<li><strong>Iterate until convergence:</strong><br>(a) Compute the <strong>centroid</strong> of each cluster (vector of feature means)<br>(b) <strong>Reassign</strong> each observation to the cluster with nearest centroid (Euclidean distance)</li>
</ol>
<div class="exam-callout"><strong>Guaranteed</strong> to decrease the objective at each step. <strong>NOT guaranteed</strong> to find the global minimum — depends on initialization. Solution: run multiple times with different starts, keep lowest WCV.</div>
<h3>Worked Example</h3>
<pre class="code-block">Points: A(1,1), B(1.5,2), C(3,4), D(5,7).  K=2.

Initial clusters: C₁={A,B}, C₂={C,D}

Centroids:
  μ₁ = ((1+1.5)/2, (1+2)/2) = (1.25, 1.5)
  μ₂ = ((3+5)/2, (4+7)/2)   = (4, 5.5)

Reassign (Euclidean distances):
  d(A, μ₁) = √0.3125 = 0.559    d(A, μ₂) = √29.25 = 5.408  → A stays C₁
  d(B, μ₁) = 0.559               d(B, μ₂) = 4.301            → B stays C₁
  d(C, μ₁) = 3.051               d(C, μ₂) = 1.803            → C stays C₂
  d(D, μ₁) = 6.657               d(D, μ₂) = 1.803            → D stays C₂

No changes → converged!

Final WCV:
  Cluster 1: 0.3125 + 0.3125 = 0.625
  Cluster 2: 3.25 + 3.25 = 6.5
  Total WCV = 7.125</pre>
<h3>Python</h3>
<pre class="code-block">from sklearn.cluster import KMeans

kmeans = KMeans(n_clusters=3, n_init=10, random_state=42)
kmeans.fit(X)
labels = kmeans.labels_
centroids = kmeans.cluster_centers_
inertia = kmeans.inertia_  # total WCV</pre>`,

hierarchical:`<h2>Hierarchical Clustering</h2>
<h3>Key Advantage</h3>
<p>Does <strong>NOT require specifying K</strong> in advance. Produces a <strong>dendrogram</strong> — cut at any height to get desired number of clusters.</p>
<h3>Agglomerative (Bottom-Up) Algorithm</h3>
<ol>
<li>Start with each observation in its own cluster (n clusters)</li>
<li>Find the two <strong>most similar</strong> (closest) clusters → merge them</li>
<li>Repeat until all observations are in a single cluster</li>
</ol>
<div class="diagram">  Dendrogram Example:

  Height
  11.31 |         _____|_____
        |        |           |
   1.41 |    ___|___     ___|___
        |   |       |   |       |
        |   A       B   C       D

  Cut at height 5 → 2 clusters: {A,B} and {C,D}
  Lower merge height = more similar observations</div>
<h3>Linkage Criteria</h3>
<table class="compare-table">
<tr><th>Linkage</th><th>Distance Between Clusters</th><th>Properties</th></tr>
<tr><td><strong>Single</strong></td><td>Minimum pairwise distance</td><td>Can chain; elongated clusters</td></tr>
<tr><td><strong>Complete</strong></td><td>Maximum pairwise distance</td><td>Compact, spherical clusters</td></tr>
<tr><td><strong>Average</strong></td><td>Average of all pairwise distances</td><td>Compromise</td></tr>
<tr><td><strong>Ward</strong></td><td>Min increase in total within-cluster variance</td><td>Similar to K-means objective</td></tr>
</table>
<h3>Worked Example (Complete Linkage)</h3>
<pre class="code-block">Points: A(1,1), B(2,2), C(8,8), D(9,9)

Pairwise distances:
  d(A,B) = √2 ≈ 1.41     d(C,D) = √2 ≈ 1.41
  d(A,C) = 7√2 ≈ 9.90    d(A,D) = 8√2 ≈ 11.31
  d(B,C) = 6√2 ≈ 8.49    d(B,D) = 7√2 ≈ 9.90

Merge sequence:
  1. Merge A & B at height √2 ≈ 1.41
  2. Merge C & D at height √2 ≈ 1.41
  3. Merge {A,B} & {C,D} at height max(9.9, 11.31, 8.49, 9.9) = 11.31

Cut at h=5 → 2 clusters: {A,B} and {C,D}</pre>
<h3>K-Means vs Hierarchical</h3>
<table class="compare-table">
<tr><th>Property</th><th>K-Means</th><th>Hierarchical</th></tr>
<tr><td>Specify K?</td><td>Yes, in advance</td><td>No (choose after via dendrogram)</td></tr>
<tr><td>Deterministic?</td><td>No (random init)</td><td>Yes (for same linkage)</td></tr>
<tr><td>Scalability</td><td>Better for large n</td><td>O(n²) or O(n³)</td></tr>
<tr><td>Cluster shape</td><td>Spherical</td><td>Arbitrary (depends on linkage)</td></tr>
</table>`,

nn:`<h2>Neural Networks</h2>
<h3>Architecture</h3>
<div class="diagram">  Neural Network:

   Input Layer    Hidden Layer(s)    Output Layer

    x₁ ──────╲      h₁  ╲
               ╲  ╱       ╲
    x₂ ────────╳─────── h₂ ───╳────── ŷ
               ╱  ╲       ╱
    x₃ ──────╱      h₃  ╱

  Each connection has weight w
  Each neuron: output = g(Σwᵢxᵢ + b)
  g() = activation function</div>
<ul>
<li><strong>Input Layer:</strong> receives raw features, no computation</li>
<li><strong>Hidden Layer(s):</strong> weights + biases + activation functions — the "learning"</li>
<li><strong>Output Layer:</strong> final prediction or classification</li>
</ul>
<h3>Single Neuron Computation</h3>
<pre class="code-block">Step 1: Weighted sum
  z = w₁x₁ + w₂x₂ + ... + wₙxₙ + b

Step 2: Activation function
  output = g(z)

The bias b allows output even when all inputs are zero.</pre>
<h3>Activation Functions</h3>
<table class="compare-table">
<tr><th>Function</th><th>Formula</th><th>Range</th><th>Use</th><th>Issue</th></tr>
<tr><td><strong>Sigmoid</strong></td><td>1/(1+e⁻ᶻ)</td><td>(0,1)</td><td>Binary output</td><td>Vanishing gradient</td></tr>
<tr><td><strong>Tanh</strong></td><td>(eᶻ−e⁻ᶻ)/(eᶻ+e⁻ᶻ)</td><td>(−1,1)</td><td>Hidden layers</td><td>Vanishing gradient</td></tr>
<tr><td><strong>ReLU</strong></td><td>max(0, z)</td><td>[0,∞)</td><td>Hidden layers ★</td><td>Dying ReLU</td></tr>
<tr><td><strong>Leaky ReLU</strong></td><td>max(0.1z, z)</td><td>(−∞,∞)</td><td>Hidden layers</td><td>Slightly complex</td></tr>
<tr><td><strong>Softmax</strong></td><td>eᶻᵏ/Σeᶻʲ</td><td>(0,1), sum=1</td><td>Multi-class output</td><td>Costly for many classes</td></tr>
</table>
<div class="diagram">  Activation Function Shapes:

  Sigmoid:        Tanh:           ReLU:         Leaky ReLU:
       ___            ___           ╱              ╱
      ╱               ╱            ╱              ╱
  ___╱            ___╱         ___╱           ___╱
  0 to 1          -1 to 1      0 if z&lt;0       0.1z if z&lt;0</div>
<div class="exam-callout"><strong>Vanishing gradients:</strong> Sigmoid/tanh squash gradients → near 0 for deep nets → slow training. ReLU fixes this. <strong>Dying ReLU:</strong> neuron stuck at 0 forever. Leaky ReLU fixes this.</div>
<h3>Forward Propagation</h3>
<ol>
<li>Input features enter the input layer</li>
<li>For each hidden neuron: compute z = Σwᵢxᵢ + b, then h = g(z)</li>
<li>Hidden outputs become inputs to next layer</li>
<li>Output layer produces final prediction</li>
</ol>
<h3>Backpropagation</h3>
<pre class="code-block">After forward pass, compare prediction to truth via loss function.
Propagate error backward using the chain rule:

  ∂Loss/∂w = ∂Loss/∂ŷ · ∂ŷ/∂z · ∂z/∂w

Update weights: w = w − η · ∂Loss/∂w
  η = learning rate</pre>
<h3>Worked Example: Forward Propagation</h3>
<pre class="code-block">Network: 2 inputs, 2 hidden (sigmoid), 1 output (sigmoid)
Inputs: x₁=1, x₂=2

Weights (input→hidden): w₁₁=0.5, w₁₂=−0.5, w₂₁=0.3, w₂₂=0.8
Hidden bias: bₕ=0.1
Weights (hidden→output): w₃₁=1.0, w₃₂=−1.0
Output bias: bₒ=0.2

Hidden Layer:
  z_h1 = 0.5(1) + 0.3(2) + 0.1 = 1.2
  h₁ = sigmoid(1.2) = 1/(1+e⁻¹·²) ≈ 0.769

  z_h2 = −0.5(1) + 0.8(2) + 0.1 = 1.2
  h₂ = sigmoid(1.2) ≈ 0.769

Output Layer:
  z_o = 1.0(0.769) + (−1.0)(0.769) + 0.2 = 0.2
  ŷ = sigmoid(0.2) ≈ 0.550</pre>
<div class="exam-callout">Be able to perform forward propagation <strong>by hand</strong>. Know all 5 activation functions and their properties. Understand backpropagation conceptually (chain rule).</div>`,

svm:`<h2>Support Vector Machines (SVM)</h2>
<h3>Core Idea</h3>
<p>Find the <strong>optimal separating hyperplane</strong> between two classes that <strong>maximizes the margin</strong> (distance to nearest points).</p>
<h3>Hyperplane</h3>
<pre class="code-block">β₀ + β₁X₁ + β₂X₂ + ... + βₚXₚ = 0

• In 2D: a line      • In 3D: a plane      • In pD: (p−1)-dimensional
• β = (β₁,...,βₚ) is the normal vector (perpendicular to hyperplane)
• f(X) > 0 → one side,  f(X) < 0 → other side

Distance from point x to hyperplane:
  d = |f(x)| / ||β|| = |β₀ + β·x| / √(Σβⱼ²)</pre>
<div class="diagram">  Maximal Margin Classifier:

  Class +1          | margin |          Class −1
    ∗               |________|               ○
    ∗ ∗         SV→ | hyper- | ←SV         ○ ○
    ∗   ∗           | plane  |           ○   ○
    ∗     ∗     SV→ |________| ←SV     ○     ○

  SV = Support Vectors (points on margin boundary)
  Hyperplane maximizes margin width</div>
<h3>Maximal Margin Classifier</h3>
<pre class="code-block">maximize M
subject to: Σβⱼ² = 1
  yᵢ(β₀ + β₁xᵢ₁ + ... + βₚxᵢₚ) ≥ M  for all i</pre>
<h3>Support Vector Classifier (Soft Margin)</h3>
<p>Allow violations via <strong>slack variables</strong> ξᵢ:</p>
<pre class="code-block">maximize M
subject to: Σβⱼ² = 1
  yᵢ(β₀ + β·xᵢ) ≥ M(1 − ξᵢ)
  ξᵢ ≥ 0,  Σξᵢ ≤ C</pre>
<h3>Slack Variable Interpretation — MUST KNOW</h3>
<table class="compare-table">
<tr><th>ξᵢ value</th><th>Location</th><th>Classified?</th></tr>
<tr><td>ξᵢ = 0</td><td>On or outside margin</td><td>Correctly classified</td></tr>
<tr><td>0 &lt; ξᵢ &lt; 1</td><td>Inside margin (violator)</td><td>Correct side, within margin</td></tr>
<tr><td>ξᵢ = 1</td><td>On the hyperplane</td><td>On boundary</td></tr>
<tr><td><strong>ξᵢ &gt; 1</strong></td><td><strong>Wrong side</strong></td><td><strong>MISCLASSIFIED</strong></td></tr>
</table>
<div class="exam-callout"><strong>C is a budget:</strong> Large C → few violations, narrow margin (low bias, high variance). Small C → many violations, wide margin (high bias, low variance).</div>
<h3>Worked Example: Soft Margin</h3>
<pre class="code-block">Obs 1: y=+1, f(x)=1.8 → y·f(x)=1.8 > 1 → outside margin (ξ=0)
Obs 2: y=+1, f(x)=0.6 → y·f(x)=0.6     → inside margin  (ξ=0.4)
Obs 3: y=+1, f(x)=−0.4→ y·f(x)=−0.4 < 0 → MISCLASSIFIED  (ξ=1.4)
Obs 4: y=−1, f(x)=−1.5→ y·f(x)=1.5 > 1 → outside margin (ξ=0)
Obs 5: y=−1, f(x)=−0.7→ y·f(x)=0.7     → inside margin  (ξ=0.3)</pre>
<h3>Worked Example: Distance to Hyperplane</h3>
<pre class="code-block">Hyperplane: 3X₁ + 4X₂ − 12 = 0   ||β|| = √(9+16) = 5

d(2,1) = |6+4−12|/5 = 2/5 = 0.4
d(3,2) = |9+8−12|/5 = 5/5 = 1.0
d(1,2) = |3+8−12|/5 = 1/5 = 0.2

If margin width=1, half-margin=0.5:
  (2,1): 0.4 < 0.5 → inside margin
  (1,2): 0.2 < 0.5 → inside margin
  (3,2): 1.0 > 0.5 → outside margin</pre>
<h3>Kernel Functions</h3>
<table class="compare-table">
<tr><th>Kernel</th><th>Formula</th><th>Properties</th></tr>
<tr><td><strong>Linear</strong></td><td>K(x,x') = x·x'</td><td>Flat hyperplane, fast</td></tr>
<tr><td><strong>Polynomial</strong></td><td>K(x,x') = (1+x·x')ᵈ</td><td>d=degree, curves</td></tr>
<tr><td><strong>RBF</strong></td><td>K(xᵢ,xᵢ') = exp(−γΣ(xᵢⱼ−xᵢ'ⱼ)²)</td><td>∞-dimensional, distance-based</td></tr>
</table>
<div class="diagram">  Kernel Trick:

  Original 1D (not separable):     Projected to 2D (separable!):

  ○ ○ ○ ∗ ∗ ∗ ○ ○ ○              ○     ○  ○
  ←─────────────────→               ○  ∗  ∗  ∗ ○
  Can't separate!                    ▔▔╱  ∗  ∗  ╲▔▔
                                     Line separates!
  Transformation: y = x²
  Linear in transformed space = nonlinear in original</div>
<h3>RBF Kernel: Worked Example</h3>
<pre class="code-block">x₁=(1,2), x₂=(3,4), x₃=(2,3),  γ=0.5

||x₁−x₂||² = (1−3)²+(2−4)² = 8
||x₁−x₃||² = (1−2)²+(2−3)² = 2

K(x₁,x₂) = e^(−0.5×8) = e^(−4) ≈ 0.0183  (low similarity)
K(x₁,x₃) = e^(−0.5×2) = e^(−1) ≈ 0.3679  (higher similarity)

Higher γ → faster decay → more localized → more complex boundary → overfit risk</pre>
<h3>Multiclass SVM</h3>
<table class="compare-table">
<tr><th>Method</th><th># Classifiers</th><th>How</th></tr>
<tr><td><strong>OVR</strong> (One-vs-Rest)</td><td>K</td><td>Each class vs all others. Highest confidence wins.</td></tr>
<tr><td><strong>OVO</strong> (One-vs-One)</td><td>K(K−1)/2</td><td>Every pair. Majority vote wins.</td></tr>
</table>
<h3>SVM vs Logistic Regression</h3>
<ul>
<li>Classes (nearly) <strong>separable</strong> → SVM better</li>
<li>Need <strong>probabilities</strong> → use LR</li>
<li><strong>p > n</strong> (more features than obs) → SVM works well</li>
<li>Nonlinear boundaries → kernel SVMs</li>
</ul>
<h3>Python</h3>
<pre class="code-block">from sklearn.svm import SVC, LinearSVC

model = LinearSVC()              # fast, linear only
model = SVC(kernel='poly', degree=3)
model = SVC(kernel='rbf', gamma=0.5, C=1.0)

# Multiclass
from sklearn.multiclass import OneVsRestClassifier, OneVsOneClassifier
ovr = OneVsRestClassifier(SVC(kernel='linear'))
ovo = OneVsOneClassifier(SVC(kernel='linear'))</pre>`

{q:'ReLU: g(−3) = ?',o:['3','0','-3','0.1'],a:1,e:'ReLU outputs 0 for any negative input. max(0, −3) = 0.'},

const MOCK_EXAMS=[(function(){
const all=[];Object.entries(QUIZZES).forEach(([tid,qs])=>{qs.forEach(q=>{all.push({t:tid,...q});});});
for(let i=all.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[all[i],all[j]]=[all[j],all[i]];}
return all.slice(0,24);
})()];

let appState={
  page:'dashboard',guideTopic:'pca',
  fcIndex:0,fcFlipped:false,fcTopic:'all',fcMode:'all',
  quizTopic:'pca',quizIndex:0,quizAnswered:false,quizSelected:-1,quizScore:0,quizTotal:0,quizDone:false,
  mockExam:-1,mockIndex:0,mockAnswers:[],mockDone:false,mockStartTime:0,mockTimerInterval:null,
};

function loadProgress(){try{return JSON.parse(localStorage.getItem('mse446_progress'))||{};}catch{return {};}}
function saveProgress(p){localStorage.setItem('mse446_progress',JSON.stringify(p));}
function getProgress(){const p=loadProgress();if(!p.quizScores)p.quizScores={};if(!p.fcKnown)p.fcKnown={};if(!p.mockScores)p.mockScores=[];if(!p.lastStudy)p.lastStudy=null;if(!p.streak)p.streak=0;return p;}
function recordQuizScore(topic,score,total){const p=getProgress();if(!p.quizScores[topic])p.quizScores[topic]=[];p.quizScores[topic].push({score,total,date:Date.now()});p.lastStudy=new Date().toDateString();saveProgress(p);}
function recordMockScore(ei,score,total,bd){const p=getProgress();p.mockScores.push({exam:ei,score,total,breakdown:bd,date:Date.now()});p.lastStudy=new Date().toDateString();saveProgress(p);}
function fcKey(c){return c.t+':'+c.q.substring(0,50);}
function toggleFcKnown(key){const p=getProgress();p.fcKnown[key]=!p.fcKnown[key];p.lastStudy=new Date().toDateString();saveProgress(p);}
function saveQuizSession(){localStorage.setItem('mse446_quizSession',JSON.stringify({quizTopic:appState.quizTopic,quizIndex:appState.quizIndex,quizScore:appState.quizScore,quizTotal:appState.quizTotal,quizDone:appState.quizDone,quizAnswered:appState.quizAnswered,quizSelected:appState.quizSelected}));}
function loadQuizSession(){try{return JSON.parse(localStorage.getItem('mse446_quizSession'));}catch{return null;}}
function clearQuizSession(){localStorage.removeItem('mse446_quizSession');}
function updateStreak(){const p=getProgress();const today=new Date().toDateString();if(p.lastStudy!==today){const y=new Date(Date.now()-86400000).toDateString();p.streak=p.lastStudy===y?p.streak+1:1;p.lastStudy=today;saveProgress(p);}const el=document.getElementById('streakDisplay');if(el&&p.streak>0)el.textContent=p.streak+' day streak';}

function navigate(page){if(appState.mockTimerInterval){clearInterval(appState.mockTimerInterval);appState.mockTimerInterval=null;}appState.page=page;if(page==='quiz'){const s=loadQuizSession();if(s&&!s.quizDone)Object.assign(appState,s);else{appState.quizIndex=0;appState.quizScore=0;appState.quizTotal=0;appState.quizDone=false;appState.quizAnswered=false;clearQuizSession();}}render();document.querySelectorAll('.nav-item').forEach(el=>{el.classList.toggle('active',el.dataset.page===page);});document.getElementById('main').scrollTop=0;const sb=document.getElementById('sidebar');if(sb.classList.contains('open'))sb.classList.remove('open');updateStreak();}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');}
function toggleTheme(){const h=document.documentElement;const n=h.dataset.theme==='dark'?'light':'dark';h.dataset.theme=n;document.getElementById('themeBtn').textContent=n==='dark'?'\u263E':'\u2600';localStorage.setItem('mse446_theme',n);}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function render(){const c=document.getElementById('content');switch(appState.page){case'dashboard':c.innerHTML=renderDashboard();break;case'guide':c.innerHTML=renderGuide();break;case'flashcards':c.innerHTML=renderFlashcards();break;case'quiz':c.innerHTML=renderQuiz();break;case'mock':c.innerHTML=renderMock();break;}}

function renderDashboard(){
const p=getProgress();const totalFC=FLASHCARDS.length;const knownFC=Object.values(p.fcKnown).filter(Boolean).length;
let totalQ=0,totalC=0;TOPICS.forEach(t=>{const s=p.quizScores[t.id]||[];if(s.length){const l=s[s.length-1];totalQ+=l.total;totalC+=l.score;}});
let topicRows='';TOPICS.forEach(t=>{let m=0,parts=0;const s=p.quizScores[t.id]||[];if(s.length){m+=(s[s.length-1].score/s[s.length-1].total)*100;parts++;}const tFC=FLASHCARDS.filter(f=>f.t===t.id);const tK=tFC.filter(f=>p.fcKnown[fcKey(f)]).length;if(tFC.length){m+=(tK/tFC.length)*100;parts++;}const o=parts?Math.round(m/parts):0;const col=o>=80?'var(--green)':o>=50?'var(--orange)':'var(--red)';topicRows+=`<div class="topic-mastery"><span class="label">${t.full}</span><div class="bar"><div class="progress-bar"><div class="fill" style="width:${o}%;background:${col}"></div></div></div><span class="pct" style="color:${col}">${o}%</span></div>`;});
let weak='',strong='';TOPICS.forEach(t=>{const s=p.quizScores[t.id]||[];if(s.length){const l=s[s.length-1];const pc=Math.round(l.score/l.total*100);if(pc<60)weak+=`<div class="weak-area">${t.full} (${pc}%) — Review this topic</div>`;else if(pc>=90)strong+=`<div class="strong-area">${t.full} (${pc}%) — Strong</div>`;}});
let mh='';p.mockScores.forEach(m=>{mh+=`<div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:13px">Mock ${m.exam+1}: ${m.score}/${m.total} (${Math.round(m.score/m.total*100)}%) — ${new Date(m.date).toLocaleDateString()}</div>`;});
const examDate=new Date('2026-04-15T09:00:00');const diff=examDate-new Date();const dd=Math.max(0,Math.floor(diff/864e5));const hh=Math.max(0,Math.floor((diff%864e5)/36e5));
return`<div class="fade-in"><h2 style="margin-bottom:16px">Dashboard</h2>
<div class="exam-format-banner"><h3>Final Exam — MSE 446/623</h3><p><strong>150 minutes.</strong> Part I: 24 MCQs (conceptual + Python). Part II: 5 long-answer problems (post-midterm topics). No formula sheet — formulas provided in questions.</p>
<div class="fmt-grid"><div class="fmt-item"><div class="num">${dd}d ${hh}h</div><div class="lbl">Until Exam</div></div><div class="fmt-item"><div class="num">24</div><div class="lbl">MCQs (Part I)</div></div><div class="fmt-item"><div class="num">5</div><div class="lbl">Long Answer (Part II)</div></div><div class="fmt-item"><div class="num">150</div><div class="lbl">Minutes</div></div></div></div>
<div class="dash-grid"><div class="dash-card"><h4>Flashcards Mastered</h4><div class="big-num">${knownFC}/${totalFC}</div><div class="progress-bar" style="margin-top:8px"><div class="fill" style="width:${totalFC?knownFC/totalFC*100:0}%"></div></div></div>
<div class="dash-card"><h4>Quiz Accuracy</h4><div class="big-num">${totalQ?Math.round(totalC/totalQ*100):0}%</div></div>
<div class="dash-card"><h4>Mock Exams</h4><div class="big-num">${p.mockScores.length}</div></div>
<div class="dash-card"><h4>Study Streak</h4><div class="big-num">${p.streak} day${p.streak!==1?'s':''}</div></div></div>
<div class="card"><h3>Topic Mastery</h3>${topicRows}</div>
${weak?`<div class="card"><h3>Areas to Focus On</h3>${weak}</div>`:''}
${strong?`<div class="card"><h3>Strong Areas</h3>${strong}</div>`:''}
${mh?`<div class="card"><h3>Mock Exam History</h3>${mh}</div>`:''}
<div class="card"><h3>Quick Start</h3><div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:12px">
<button class="btn btn-primary" onclick="navigate('guide')">Study Guide</button>
<button class="btn btn-secondary" onclick="navigate('flashcards')">Flashcards</button>
<button class="btn btn-secondary" onclick="navigate('quiz')">Take a Quiz</button>
<button class="btn btn-secondary" onclick="navigate('mock')">Mock Exam</button></div></div></div>`;
}

function renderGuide(){const tabs=TOPICS.map(t=>`<button class="tab ${appState.guideTopic===t.id?'active':''}" onclick="appState.guideTopic='${t.id}';render()">${t.full}</button>`).join('');return`<div class="fade-in"><h2 style="margin-bottom:16px">Study Guide</h2><div class="tabs">${tabs}</div><div class="card">${GUIDE[appState.guideTopic]||'<p>Coming soon.</p>'}</div></div>`;}

function renderFlashcards(){const p=getProgress();let cards=[...FLASHCARDS];if(appState.fcTopic!=='all')cards=cards.filter(f=>f.t===appState.fcTopic);if(appState.fcMode==='learning')cards=cards.filter(f=>!p.fcKnown[fcKey(f)]);if(!cards.length)return`<div class="fade-in"><h2>Flashcards</h2><div class="card"><p>No cards match. Try changing topic or mode.</p></div></div>`;if(appState.fcIndex>=cards.length)appState.fcIndex=0;const card=cards[appState.fcIndex];const ck=fcKey(card);const known=p.fcKnown[ck];const tn=TOPICS.find(t=>t.id===card.t)?.full||card.t;const chips=`<button class="topic-chip ${appState.fcTopic==='all'?'active':''}" onclick="appState.fcTopic='all';appState.fcIndex=0;appState.fcFlipped=false;render()">All</button>`+TOPICS.map(t=>`<button class="topic-chip ${appState.fcTopic===t.id?'active':''}" onclick="appState.fcTopic='${t.id}';appState.fcIndex=0;appState.fcFlipped=false;render()">${t.name}</button>`).join('');
return`<div class="fade-in"><h2 style="margin-bottom:16px">Flashcards</h2><div class="topic-selector">${chips}</div><div style="display:flex;gap:8px;justify-content:center;margin-bottom:16px"><button class="btn btn-sm ${appState.fcMode==='all'?'btn-primary':'btn-secondary'}" onclick="appState.fcMode='all';appState.fcIndex=0;appState.fcFlipped=false;render()">All Cards</button><button class="btn btn-sm ${appState.fcMode==='learning'?'btn-primary':'btn-secondary'}" onclick="appState.fcMode='learning';appState.fcIndex=0;appState.fcFlipped=false;render()">Still Learning</button><button class="btn btn-sm btn-secondary" onclick="shuffleFC()">Shuffle</button></div>
<div class="flashcard-container"><div class="flashcard-progress">${appState.fcIndex+1} / ${cards.length}</div><div class="flashcard ${appState.fcFlipped?'flipped':''}" onclick="appState.fcFlipped=!appState.fcFlipped;render()"><div class="flashcard-inner"><div class="flashcard-front"><div class="flashcard-topic">${esc(tn)}</div><p>${esc(card.q)}</p></div><div class="flashcard-back"><div class="flashcard-topic">Answer</div><p>${esc(card.a)}</p></div></div></div>
<div class="flashcard-controls"><button class="btn btn-secondary" onclick="fcPrev()" ${appState.fcIndex===0?'disabled':''}>Previous</button><button class="btn ${known?'btn-success':'btn-secondary'}" onclick='toggleFcKnown(${JSON.stringify(ck)});render()'>${known?'Known':'Mark Known'}</button><button class="btn btn-primary" onclick="fcNext(${cards.length})">Next</button></div></div></div>`;}

function fcNext(t){appState.fcIndex=(appState.fcIndex+1)%t;appState.fcFlipped=false;render();}
function fcPrev(){if(appState.fcIndex>0){appState.fcIndex--;appState.fcFlipped=false;render();}}
function shuffleFC(){const a=[...FLASHCARDS];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}FLASHCARDS.length=0;FLASHCARDS.push(...a);appState.fcIndex=0;appState.fcFlipped=false;render();}

function renderQuiz(){const chips=TOPICS.map(t=>`<button class="topic-chip ${appState.quizTopic===t.id?'active':''}" onclick="startQuiz('${t.id}')">${t.name}</button>`).join('');const qs=QUIZZES[appState.quizTopic]||[];if(!qs.length)return`<div class="fade-in"><h2>Quizzes</h2><div class="topic-selector">${chips}</div><div class="card"><p>No questions for this topic.</p></div></div>`;
if(appState.quizDone){const pc=Math.round(appState.quizScore/appState.quizTotal*100);return`<div class="fade-in"><h2>Quiz Complete!</h2><div class="card"><div class="quiz-score">${pc}%</div><div class="quiz-score-sub">${appState.quizScore} / ${appState.quizTotal} correct</div><div style="text-align:center;margin-top:16px"><button class="btn btn-primary" onclick="startQuiz('${appState.quizTopic}')">Retry</button> <button class="btn btn-secondary" onclick="navigate('dashboard')">Dashboard</button></div></div></div>`;}
const qn=qs[appState.quizIndex];const opts=qn.o.map((o,i)=>{let cl='quiz-option';if(appState.quizAnswered){if(i===qn.a)cl+=' correct';else if(i===appState.quizSelected)cl+=' incorrect';}else if(i===appState.quizSelected)cl+=' selected';return`<button class="${cl}" onclick="selectQuizAnswer(${i})" ${appState.quizAnswered?'disabled':''}>${String.fromCharCode(65+i)}) ${esc(o)}</button>`;}).join('');
return`<div class="fade-in"><h2 style="margin-bottom:16px">Quizzes</h2><div class="topic-selector">${chips}</div><div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:12px"><span style="font-size:13px;color:var(--text2)">Question ${appState.quizIndex+1}/${qs.length}</span><span style="font-size:13px;color:var(--text2)">Score: ${appState.quizScore}</span></div><div class="progress-bar" style="margin-bottom:16px"><div class="fill" style="width:${(appState.quizIndex/qs.length)*100}%"></div></div><h3 style="margin-bottom:16px;color:var(--text)">${esc(qn.q)}</h3>${opts}${appState.quizAnswered?`<div class="quiz-explanation"><strong>${appState.quizSelected===qn.a?'Correct!':'Incorrect.'}</strong> ${esc(qn.e)}</div><div style="text-align:right;margin-top:12px"><button class="btn btn-primary" onclick="nextQuizQ()">Next</button></div>`:''}</div></div>`;}

function startQuiz(t){appState.quizTopic=t;appState.quizIndex=0;appState.quizScore=0;appState.quizTotal=0;appState.quizDone=false;appState.quizAnswered=false;appState.quizSelected=-1;saveQuizSession();render();}
function selectQuizAnswer(i){if(appState.quizAnswered)return;appState.quizSelected=i;appState.quizAnswered=true;const qn=QUIZZES[appState.quizTopic][appState.quizIndex];appState.quizTotal++;if(i===qn.a)appState.quizScore++;saveQuizSession();render();}
function nextQuizQ(){const qs=QUIZZES[appState.quizTopic];appState.quizIndex++;appState.quizAnswered=false;appState.quizSelected=-1;if(appState.quizIndex>=qs.length){appState.quizDone=true;recordQuizScore(appState.quizTopic,appState.quizScore,appState.quizTotal);clearQuizSession();}else saveQuizSession();render();}

function renderMock(){if(appState.mockExam===-1){const p=getProgress();const cards=MOCK_EXAMS.map((exam,i)=>{const taken=p.mockScores.filter(m=>m.exam===i);const best=taken.length?Math.max(...taken.map(t=>Math.round(t.score/t.total*100))):null;return`<div class="card" style="cursor:pointer" onclick="startMock(${i})"><h3>Mock Exam ${i+1}</h3><p style="color:var(--text2)">${exam.length} questions · Simulates Part I</p>${best!==null?`<p style="margin-top:8px">Best: <strong style="color:var(--accent)">${best}%</strong> (${taken.length} attempt${taken.length>1?'s':''})</p>`:'<p style="margin-top:8px;color:var(--text2)">Not attempted</p>'}<button class="btn btn-primary" style="margin-top:12px">Start Exam</button></div>`;}).join('');
return`<div class="fade-in"><h2 style="margin-bottom:16px">Mock Exams</h2><div class="exam-format-banner"><h3>Exam Format</h3><p>24 MCQs covering conceptual understanding and Python. Time yourself: ~60 min for Part I. Post-midterm topics: NN, PCA, Clustering, SVM.</p></div>${cards}</div>`;}
const exam=MOCK_EXAMS[appState.mockExam];
if(appState.mockDone){const score=appState.mockAnswers.reduce((s,a,i)=>s+(a===exam[i].a?1:0),0);const pct=Math.round(score/exam.length*100);const bd={};exam.forEach((q,i)=>{if(!bd[q.t])bd[q.t]={c:0,t:0};bd[q.t].t++;if(appState.mockAnswers[i]===q.a)bd[q.t].c++;});
let bdH='';Object.entries(bd).forEach(([tid,v])=>{const tn=TOPICS.find(t=>t.id===tid)?.full||tid;const p2=Math.round(v.c/v.t*100);const col=p2>=80?'var(--green)':p2>=50?'var(--orange)':'var(--red)';bdH+=`<div class="topic-mastery"><span class="label">${tn}</span><div class="bar"><div class="progress-bar"><div class="fill" style="width:${p2}%;background:${col}"></div></div></div><span class="pct" style="color:${col}">${v.c}/${v.t}</span></div>`;});
let rH='';exam.forEach((q,i)=>{const ok=appState.mockAnswers[i]===q.a;rH+=`<div style="padding:12px 0;border-bottom:1px solid var(--border)"><p style="font-weight:600;${ok?'':'color:var(--red)'}">${i+1}. ${esc(q.q)}</p><p style="font-size:13px;margin-top:4px">Your answer: <strong>${esc(q.o[appState.mockAnswers[i]]||'(skipped)')}</strong> ${ok?'✓':'✗ Correct: <strong>'+esc(q.o[q.a])+'</strong>'}</p><p style="font-size:13px;color:var(--text2);margin-top:2px">${esc(q.e)}</p></div>`;});
return`<div class="fade-in"><h2>Exam Complete!</h2><div class="card"><div class="quiz-score">${pct}%</div><div class="quiz-score-sub">${score}/${exam.length} correct</div></div><div class="card"><h3>Topic Breakdown</h3>${bdH}</div><div class="card"><h3>Review All</h3>${rH}</div><div style="text-align:center;margin-top:16px"><button class="btn btn-primary" onclick="appState.mockExam=-1;appState.mockDone=false;render()">Back to Exams</button></div></div>`;}
const elapsed=Math.floor((Date.now()-appState.mockStartTime)/1000);const mins=Math.floor(elapsed/60),secs=elapsed%60;const timeStr=`${mins}:${secs<10?'0':''}${secs}`;const timeCls=mins>=55?'danger':mins>=45?'warning':'';const qn=exam[appState.mockIndex];
const opts=qn.o.map((o,i)=>{let cl='quiz-option';if(appState.mockAnswers[appState.mockIndex]===i)cl+=' selected';return`<button class="${cl}" onclick="selectMockAnswer(${i})">${String.fromCharCode(65+i)}) ${esc(o)}</button>`;}).join('');
const dots=exam.map((_,i)=>{const a=appState.mockAnswers[i];const cl=i===appState.mockIndex?'background:var(--accent)':a!==undefined?'background:var(--green)':'background:var(--bg4)';return`<span style="display:inline-block;width:10px;height:10px;border-radius:50%;${cl};cursor:pointer;margin:2px" onclick="appState.mockIndex=${i};render()"></span>`;}).join('');
return`<div class="fade-in"><div class="mock-timer"><span style="font-size:14px">Question ${appState.mockIndex+1}/${exam.length}</span><span class="time ${timeCls}">${timeStr}</span><button class="btn btn-danger btn-sm" onclick="finishMock()">Finish Exam</button></div><div class="card"><h3 style="margin-bottom:16px">${esc(qn.q)}</h3>${opts}<div style="display:flex;justify-content:space-between;margin-top:16px"><button class="btn btn-secondary" onclick="mockNav(-1)" ${appState.mockIndex===0?'disabled':''}>Previous</button><button class="btn btn-primary" onclick="mockNav(1)">${appState.mockIndex===exam.length-1?'Review / Finish':'Next'}</button></div></div><div style="text-align:center;margin-top:12px">${dots}</div></div>`;}

function startMock(i){appState.mockExam=i;appState.mockIndex=0;appState.mockAnswers=[];appState.mockDone=false;appState.mockStartTime=Date.now();if(appState.mockTimerInterval)clearInterval(appState.mockTimerInterval);appState.mockTimerInterval=setInterval(()=>{const el=document.querySelector('.mock-timer .time');if(!el)return;const e=Math.floor((Date.now()-appState.mockStartTime)/1000);const m=Math.floor(e/60),s=e%60;el.textContent=`${m}:${s<10?'0':''}${s}`;el.className='time'+(m>=55?' danger':m>=45?' warning':'');},1000);render();}
function selectMockAnswer(i){appState.mockAnswers[appState.mockIndex]=i;render();}
function mockNav(dir){const exam=MOCK_EXAMS[appState.mockExam];if(dir===1&&appState.mockIndex===exam.length-1){finishMock();return;}appState.mockIndex=Math.max(0,Math.min(exam.length-1,appState.mockIndex+dir));render();}
function finishMock(){if(appState.mockTimerInterval){clearInterval(appState.mockTimerInterval);appState.mockTimerInterval=null;}appState.mockDone=true;const exam=MOCK_EXAMS[appState.mockExam];const score=appState.mockAnswers.reduce((s,a,i)=>s+(a===exam[i].a?1:0),0);const bd={};exam.forEach((q,i)=>{if(!bd[q.t])bd[q.t]={c:0,t:0};bd[q.t].t++;if(appState.mockAnswers[i]===q.a)bd[q.t].c++;});recordMockScore(appState.mockExam,score,exam.length,bd);render();}

(function init(){const s=localStorage.getItem('mse446_theme');if(s){document.documentElement.dataset.theme=s;document.getElementById('themeBtn').textContent=s==='dark'?'\u263E':'\u2600';}updateStreak();navigate('dashboard');})();
</script>
</body>
</html>
