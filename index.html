/* ===== DESIGN TOKENS ===== */

/* ===== QUIZ ===== */

pca:`<h2>Principal Component Analysis</h2>
<h3>What is PCA?</h3>
<p>A <strong>dimensionality reduction</strong> method that finds <strong>linear combinations</strong> of variables with <strong>maximal variance</strong>, mutually uncorrelated. Solved via eigenvalue decomposition of the covariance matrix.</p>
<div class="callout callout-key"><div class="callout-label">Key Exam Point</div>PCA looks for directions of <strong>maximum variance</strong>. Clustering looks for <strong>homogeneous subgroups</strong>.</div>
<h3>First Principal Component</h3>
<pre class="code">Z₁ = φ₁₁X₁ + φ₂₁X₂ + ... + φₚ₁Xₚ

subject to: Σ φⱼ₁² = 1  (normalization)

• Loadings define the direction of maximum variance
• Scores are projections onto this direction</pre>
<h3>Further PCs</h3>
<ul><li>PC2 maximizes variance among all directions <strong>orthogonal to PC1</strong></li><li>Max PCs = <strong>min(n−1, p)</strong></li></ul>
<div class="diagram">     PC2 (less variance)
      ↑
      |     · ·
      |   ·  ╱  ·       PC1 (most variance)
      |  · ╱     ·      ──────→
      | ·╱    ·
      |╱ ·  ·
──────┼──────────→
   PCA rotates axes to maximize
   variance along PC1, then PC2</div>
<h3>5-Step PCA Process</h3>
<ol><li><strong>Standardize</strong> — each feature mean=0, std=1</li><li><strong>Covariance matrix</strong> — relationships between variables</li><li><strong>Eigenvalues &amp; eigenvectors</strong> — variance per PC + loading directions</li><li><strong>Choose # PCs</strong> — scree plot, look for elbow</li><li><strong>Project data</strong> — multiply by feature vector</li></ol>
<h3>Proportion of Variance Explained</h3>
<pre class="code">PVEₘ = λₘ / Σλⱼ

• Between 0 and 1, all PVEs sum to 1
• Scree plot: PVE vs component — look for "elbow"</pre>
<h3>Worked Example</h3>
<pre class="code">Data: (2,3), (3,4), (4,5)

Center: means X̄₁=3, X̄₂=4
  Centered: (-1,-1), (0,0), (1,1)

Covariance (1/n):
  Var(X₁) = 2/3,  Var(X₂) = 2/3,  Cov = 2/3
  Σ = [[2/3, 2/3], [2/3, 2/3]]

Eigenvalues: λ₁ = 4/3, λ₂ = 0
  PVE₁ = 100% (perfect correlation)

Eigenvector: φ₁ = (1/√2, 1/√2)
  PC1 = (1/√2)(X₁ + X₂)</pre>
<h3>Worked Example: Route Optimization</h3>
<pre class="code">Z₁ = 0.6X₁ + 0.6X₂ + 0.529X₃
λ₁=5.5, λ₂=1.2, λ₃=0.3

Total = 7.0
PVE₁ = 78.6%,  PVE₂ = 17.1%,  PVE₃ = 4.3%
Cumulative (PC1+PC2) = 95.7% → retain 2</pre>
<h3>Python</h3>
<pre class="code">from sklearn.preprocessing import StandardScaler
from sklearn.decomposition import PCA

X_scaled = StandardScaler().fit_transform(X)
pca = PCA(n_components=2).fit(X_scaled)

pca.explained_variance_ratio_  # PVE
pca.components_                # loadings</pre>
<div class="callout callout-warn"><div class="callout-label">Watch Out</div>Always standardize before PCA unless told otherwise. Different scales → different PCs.</div>`,

kmeans:`<h2>K-Means Clustering</h2>
<h3>Core Idea</h3>
<p>Partition n observations into K clusters by minimizing <strong>within-cluster variation</strong>. K must be specified in advance.</p>
<h3>Formulation</h3>
<pre class="code">Objective: min Σₖ WCV(Cₖ)

WCV(Cₖ) = (1/|Cₖ|) Σᵢ,ᵢ'∈Cₖ Σⱼ (xᵢⱼ − xᵢ'ⱼ)²
         = 2 Σᵢ∈Cₖ ||xᵢ − x̄ₖ||²

Properties:
1. Every obs in exactly one cluster
2. Clusters non-overlapping</pre>
<h3>Algorithm</h3>
<ol><li><strong>Initialize:</strong> randomly assign each obs to cluster 1..K</li><li><strong>Iterate:</strong><br/>(a) Compute centroid (feature means per cluster)<br/>(b) Reassign each obs to nearest centroid</li></ol>
<div class="callout callout-key"><div class="callout-label">Key Exam Point</div><strong>Guaranteed</strong> to decrease objective each step. <strong>NOT guaranteed</strong> global minimum. Solution: multiple random starts, keep lowest WCV.</div>
<h3>Worked Example</h3>
<pre class="code">A(1,1), B(1.5,2), C(3,4), D(5,7)  K=2

Init: C₁={A,B}, C₂={C,D}
Centroids: μ₁=(1.25,1.5)  μ₂=(4,5.5)

Distances:
  d(A,μ₁)=0.56  d(A,μ₂)=5.41 → C₁
  d(B,μ₁)=0.56  d(B,μ₂)=4.30 → C₁
  d(C,μ₁)=3.05  d(C,μ₂)=1.80 → C₂
  d(D,μ₁)=6.66  d(D,μ₂)=1.80 → C₂

No changes → converged!
Total WCV = 0.625 + 6.5 = 7.125</pre>`,

hierarchical:`<h2>Hierarchical Clustering</h2>
<h3>Key Advantage</h3>
<p><strong>No K needed in advance.</strong> Produces a dendrogram — cut at any height for desired clusters.</p>
<h3>Agglomerative Algorithm</h3>
<ol><li>Each obs = its own cluster</li><li>Merge two closest clusters</li><li>Repeat until one cluster remains</li></ol>
<div class="diagram">  Dendrogram:

  Height
  11.31 |       _____|_____
        |      |           |
   1.41 |  ___|___     ___|___
        | |       |   |       |
        | A       B   C       D

  Cut at h=5 → {A,B} and {C,D}</div>
<h3>Linkage Criteria</h3>
<table class="tbl"><tr><th>Linkage</th><th>Measure</th><th>Character</th></tr>
<tr><td><strong>Single</strong></td><td>Min pairwise distance</td><td>Can chain; elongated</td></tr>
<tr><td><strong>Complete</strong></td><td>Max pairwise distance</td><td>Compact, spherical</td></tr>
<tr><td><strong>Average</strong></td><td>Mean of all pairs</td><td>Compromise</td></tr>
<tr><td><strong>Ward</strong></td><td>Min variance increase</td><td>K-means-like</td></tr></table>
<h3>Worked Example (Complete)</h3>
<pre class="code">A(1,1), B(2,2), C(8,8), D(9,9)

d(A,B)=√2≈1.41   d(C,D)=√2≈1.41
d(A,C)=7√2≈9.90  d(A,D)=8√2≈11.31
d(B,C)=6√2≈8.49  d(B,D)=7√2≈9.90

Merge: A&B at 1.41, C&D at 1.41
Then {A,B}&{C,D} at max=11.31</pre>
<h3>K-Means vs Hierarchical</h3>
<table class="tbl"><tr><th></th><th>K-Means</th><th>Hierarchical</th></tr>
<tr><td>Specify K?</td><td>Yes</td><td>No (dendrogram)</td></tr>
<tr><td>Deterministic?</td><td>No</td><td>Yes</td></tr>
<tr><td>Scalability</td><td>Good</td><td>O(n²+)</td></tr></table>`,

nn:`<h2>Neural Networks</h2>
<h3>Architecture</h3>
<div class="diagram">  Input       Hidden        Output

   x₁ ─────╲     h₁ ╲
              ╲ ╱      ╲
   x₂ ────────╳──── h₂ ──╳──── ŷ
              ╱ ╲      ╱
   x₃ ─────╱     h₃ ╱

  Neuron: output = g(Σwᵢxᵢ + b)</div>
<ul><li><strong>Input:</strong> raw features</li><li><strong>Hidden:</strong> weights + bias + activation</li><li><strong>Output:</strong> prediction</li></ul>
<h3>Activation Functions</h3>
<table class="tbl"><tr><th>Function</th><th>Formula</th><th>Range</th><th>Use</th><th>Issue</th></tr>
<tr><td><strong>Sigmoid</strong></td><td>1/(1+e⁻ᶻ)</td><td>(0,1)</td><td>Binary output</td><td>Vanishing grad</td></tr>
<tr><td><strong>Tanh</strong></td><td>(eᶻ−e⁻ᶻ)/(eᶻ+e⁻ᶻ)</td><td>(−1,1)</td><td>Hidden</td><td>Vanishing grad</td></tr>
<tr><td><strong>ReLU</strong></td><td>max(0,z)</td><td>[0,∞)</td><td>Hidden ★</td><td>Dying ReLU</td></tr>
<tr><td><strong>Leaky ReLU</strong></td><td>max(0.1z,z)</td><td>(−∞,∞)</td><td>Hidden</td><td>—</td></tr>
<tr><td><strong>Softmax</strong></td><td>eᶻᵏ/Σeᶻʲ</td><td>(0,1) Σ=1</td><td>Multi-class</td><td>—</td></tr></table>
<div class="callout callout-key"><div class="callout-label">Key Exam Point</div><strong>Vanishing gradient:</strong> sigmoid/tanh squash gradients → near 0 deep. ReLU fixes. <strong>Dying ReLU:</strong> stuck at 0. Leaky ReLU fixes.</div>
<h3>Forward Propagation</h3>
<pre class="code">Step 1: z = Σwᵢxᵢ + b   (weighted sum)
Step 2: output = g(z)    (activation)</pre>
<h3>Backpropagation</h3>
<pre class="code">Chain rule:
  ∂Loss/∂w = ∂Loss/∂ŷ · ∂ŷ/∂z · ∂z/∂w

Update: w ← w − η · ∂Loss/∂w</pre>
<h3>Worked Example</h3>
<pre class="code">2 inputs, 2 hidden (sigmoid), 1 output (sigmoid)
x₁=1, x₂=2

Weights: w₁₁=0.5, w₁₂=−0.5, w₂₁=0.3, w₂₂=0.8
Biases: bₕ=0.1, bₒ=0.2
Hidden→Output: w₃₁=1.0, w₃₂=−1.0

Hidden:
  z₁ = 0.5(1)+0.3(2)+0.1 = 1.2 → σ(1.2) ≈ 0.769
  z₂ = −0.5(1)+0.8(2)+0.1 = 1.2 → σ(1.2) ≈ 0.769

Output:
  z = 1.0(0.769)+(−1.0)(0.769)+0.2 = 0.2
  ŷ = σ(0.2) ≈ 0.550</pre>`,

svm:`<h2>Support Vector Machines</h2>
<h3>Core Idea</h3>
<p>Find the <strong>optimal separating hyperplane</strong> that <strong>maximizes the margin</strong> to nearest points.</p>
<h3>Hyperplane</h3>
<pre class="code">β₀ + β₁X₁ + ... + βₚXₚ = 0

• 2D: line   3D: plane   pD: (p−1)-dimensional
• β = normal vector (perpendicular)
• Distance: d = |f(x)| / ||β||</pre>
<div class="diagram">  Maximal Margin:

  Class +1     | margin |     Class −1
    ∗          |________|          ○
    ∗ ∗    SV→ | hyper- | ←SV   ○ ○
    ∗   ∗      | plane  |     ○   ○
    ∗      SV→ |________| ←SV     ○

  SV = Support Vectors</div>
<h3>Soft Margin (Slack ξ)</h3>
<table class="tbl"><tr><th>ξᵢ</th><th>Location</th><th>Status</th></tr>
<tr><td>= 0</td><td>Outside margin</td><td>Correct</td></tr>
<tr><td>0 &lt; ξ &lt; 1</td><td>Inside margin</td><td>Correct side</td></tr>
<tr><td>= 1</td><td>On hyperplane</td><td>Boundary</td></tr>
<tr><td><strong>&gt; 1</strong></td><td><strong>Wrong side</strong></td><td><strong>Misclassified</strong></td></tr></table>
<div class="callout callout-key"><div class="callout-label">Key Exam Point</div><strong>C parameter:</strong> Large C → few violations, narrow margin (low bias, high var). Small C → wide margin (high bias, low var).</div>
<h3>Worked Example: Distance</h3>
<pre class="code">Hyperplane: 3X₁+4X₂−12=0   ||β||=5

d(2,1) = |6+4−12|/5 = 0.4  (inside margin)
d(3,2) = |9+8−12|/5 = 1.0  (outside)
d(1,2) = |3+8−12|/5 = 0.2  (inside)</pre>
<h3>Kernels</h3>
<table class="tbl"><tr><th>Kernel</th><th>Formula</th><th>Boundary</th></tr>
<tr><td>Linear</td><td>x·x'</td><td>Flat</td></tr>
<tr><td>Polynomial</td><td>(1+x·x')ᵈ</td><td>Curved</td></tr>
<tr><td>RBF</td><td>exp(−γ||x−x'||²)</td><td>Flexible</td></tr></table>
<h3>RBF Worked Example</h3>
<pre class="code">x₁=(1,2), x₂=(3,4), x₃=(2,3), γ=0.5

K(x₁,x₂) = e^(−0.5×8) = e^−4 ≈ 0.018
K(x₁,x₃) = e^(−0.5×2) = e^−1 ≈ 0.368

↑γ → faster decay → complex boundary → overfit</pre>
<h3>Multiclass</h3>
<table class="tbl"><tr><th>Method</th><th>Classifiers</th></tr>
<tr><td>OVR</td><td>K</td></tr>
<tr><td>OVO</td><td>K(K−1)/2</td></tr></table>`

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function navigate(pg){if(S.mti){clearInterval(S.mti);S.mti=null;}S.page=pg;if(pg==='quiz'){const sv=lqz();if(sv&&!sv.qd)Object.assign(S,sv);else{S.qi=0;S.qsc=0;S.qtl=0;S.qd=false;S.qa=false;cqz();}}render();document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.page===pg));document.getElementById('main').scrollTop=0;document.getElementById('sidebar').classList.remove('open');us();}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');}
function toggleTheme(){const h=document.documentElement;const n=h.dataset.theme==='dark'?'light':'dark';h.dataset.theme=n;document.getElementById('themeBtn').textContent=n==='dark'?'\u263E':'\u2600';localStorage.setItem('mse446t',n);}

function render(){document.getElementById('content').innerHTML={dashboard:rDash,guide:rGuide,flashcards:rFC,quiz:rQuiz,mock:rMock}[S.page]();}

function rDash(){
const p=gp();const nfc=FC.length;const kfc=Object.values(p.fk).filter(Boolean).length;
let tq=0,tc=0;T.forEach(t=>{const s=p.qs[t.id]||[];if(s.length){const l=s[s.length-1];tq+=l.t;tc+=l.s;}});
let rows='';T.forEach(t=>{let m=0,n=0;const s=p.qs[t.id]||[];if(s.length){m+=(s[s.length-1].s/s[s.length-1].t)*100;n++;}const tf=FC.filter(f=>f.t===t.id),tk=tf.filter(f=>p.fk[fk(f)]).length;if(tf.length){m+=(tk/tf.length)*100;n++;}const o=n?Math.round(m/n):0;const c=o>=80?'var(--green)':o>=50?'var(--amber)':'var(--red)';rows+=`<div class="mastery-row"><span class="mastery-label">${t.f}</span><div class="mastery-bar"><div class="progress"><div class="progress-fill" style="width:${o}%;background:${c}"></div></div></div><span class="mastery-pct" style="color:${c}">${o}%</span></div>`;});
let wk='',st='';T.forEach(t=>{const s=p.qs[t.id]||[];if(s.length){const l=s[s.length-1];const pc=Math.round(l.s/l.t*100);if(pc<60)wk+=`<div class="weak">${t.f} (${pc}%) — needs review</div>`;else if(pc>=90)st+=`<div class="strong">${t.f} (${pc}%) — strong</div>`;}});
const ed=new Date('2026-04-15T09:00:00');const df=ed-new Date();const dd=Math.max(0,Math.floor(df/864e5));const hh=Math.max(0,Math.floor((df%864e5)/36e5));
return`<div class="fade-in"><h2 style="margin-bottom:16px">Dashboard</h2>
<div class="banner"><h3>Final Exam — MSE 446/623</h3><p><strong>150 min.</strong> Part I: 24 MCQs. Part II: 5 long-answer (post-midterm). Formulas provided in questions.</p>
<div class="banner-grid"><div class="banner-item"><div class="banner-num">${dd}d ${hh}h</div><div class="banner-lbl">Until Exam</div></div><div class="banner-item"><div class="banner-num">24</div><div class="banner-lbl">MCQs</div></div><div class="banner-item"><div class="banner-num">5</div><div class="banner-lbl">Long Answer</div></div><div class="banner-item"><div class="banner-num">150m</div><div class="banner-lbl">Duration</div></div></div></div>
<div class="stat-grid"><div class="stat-card"><div class="stat-label">Flashcards Mastered</div><div class="stat-value">${kfc}<span style="font-size:16px;color:var(--text-secondary);font-weight:500">/${nfc}</span></div><div class="progress" style="margin-top:10px"><div class="progress-fill" style="width:${nfc?kfc/nfc*100:0}%"></div></div></div>
<div class="stat-card"><div class="stat-label">Quiz Accuracy</div><div class="stat-value">${tq?Math.round(tc/tq*100):0}%</div></div>
<div class="stat-card"><div class="stat-label">Mock Exams</div><div class="stat-value">${p.ms.length}</div></div>
<div class="stat-card"><div class="stat-label">Study Streak</div><div class="stat-value">${p.st}<span style="font-size:14px;color:var(--text-secondary);font-weight:500"> day${p.st!==1?'s':''}</span></div></div></div>
<div class="card"><h3 style="margin-top:0">Topic Mastery</h3>${rows}</div>
${wk?`<div class="card"><h3 style="margin-top:0">Focus Areas</h3>${wk}</div>`:''}${st?`<div class="card"><h3 style="margin-top:0">Strong Areas</h3>${st}</div>`:''}
<div class="card"><h3 style="margin-top:0">Quick Start</h3><div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:12px"><button class="btn btn-primary" onclick="navigate('guide')">Study Guide</button><button class="btn btn-ghost" onclick="navigate('flashcards')">Flashcards</button><button class="btn btn-ghost" onclick="navigate('quiz')">Quiz</button><button class="btn btn-ghost" onclick="navigate('mock')">Mock Exam</button></div></div></div>`;}

function rGuide(){return`<div class="fade-in"><h2 style="margin-bottom:16px">Study Guide</h2><div class="tabs">${T.map(t=>`<button class="tab ${S.gt===t.id?'active':''}" onclick="S.gt='${t.id}';render()">${t.f}</button>`).join('')}</div><div class="card">${G[S.gt]||''}</div></div>`;}

function rFC(){const p=gp();let cards=[...FC];if(S.ft!=='all')cards=cards.filter(f=>f.t===S.ft);if(S.fm==='learning')cards=cards.filter(f=>!p.fk[fk(f)]);if(!cards.length)return`<div class="fade-in"><h2>Flashcards</h2><div class="card"><p>No cards match. Change topic or mode.</p></div></div>`;if(S.fi>=cards.length)S.fi=0;const c=cards[S.fi],ck=fk(c),kn=p.fk[ck];
return`<div class="fade-in"><h2 style="margin-bottom:16px">Flashcards</h2>
<div class="chips"><button class="chip ${S.ft==='all'?'active':''}" onclick="S.ft='all';S.fi=0;S.ff=false;render()">All</button>${T.map(t=>`<button class="chip ${S.ft===t.id?'active':''}" onclick="S.ft='${t.id}';S.fi=0;S.ff=false;render()">${t.s}</button>`).join('')}</div>
<div style="display:flex;gap:6px;justify-content:center;margin-bottom:16px"><button class="btn btn-sm ${S.fm==='all'?'btn-primary':'btn-ghost'}" onclick="S.fm='all';S.fi=0;S.ff=false;render()">All</button><button class="btn btn-sm ${S.fm==='learning'?'btn-primary':'btn-ghost'}" onclick="S.fm='learning';S.fi=0;S.ff=false;render()">Learning</button><button class="btn btn-sm btn-ghost" onclick="shFC()">Shuffle</button></div>
<div class="fc-wrap"><div class="fc-count">${S.fi+1} / ${cards.length}</div>
<div class="fc-card ${S.ff?'flipped':''}" onclick="S.ff=!S.ff;render()"><div class="fc-inner"><div class="fc-face fc-front"><div class="fc-topic">${esc(T.find(t=>t.id===c.t)?.f||'')}</div><p class="fc-text">${esc(c.q)}</p></div><div class="fc-face fc-back"><div class="fc-topic">Answer</div><p class="fc-text">${esc(c.a)}</p></div></div></div>
<div class="fc-controls"><button class="btn btn-ghost btn-sm" onclick="if(S.fi>0){S.fi--;S.ff=false;render();}" ${S.fi===0?'disabled':''}>Prev</button><button class="btn btn-sm ${kn?'btn-success':'btn-ghost'}" onclick='tfk(${JSON.stringify(ck)});render()'>${kn?'Known':'Mark Known'}</button><button class="btn btn-primary btn-sm" onclick="S.fi=(S.fi+1)%${cards.length};S.ff=false;render()">Next</button></div></div></div>`;}
function shFC(){const a=[...FC];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}FC.length=0;FC.push(...a);S.fi=0;S.ff=false;render();}

function rQuiz(){const chips=T.map(t=>`<button class="chip ${S.qt===t.id?'active':''}" onclick="stQ('${t.id}')">${t.s}</button>`).join('');const qs=Q[S.qt]||[];if(!qs.length)return`<div class="fade-in"><h2>Quizzes</h2><div class="chips">${chips}</div><div class="card"><p>No questions.</p></div></div>`;
if(S.qd){const pc=Math.round(S.qsc/S.qtl*100);return`<div class="fade-in"><h2>Quiz Complete</h2><div class="card"><div class="q-score">${pc}%</div><div class="q-score-sub">${S.qsc}/${S.qtl} correct</div><div style="text-align:center;margin-top:16px"><button class="btn btn-primary" onclick="stQ('${S.qt}')">Retry</button> <button class="btn btn-ghost" onclick="navigate('dashboard')">Dashboard</button></div></div></div>`;}
const qn=qs[S.qi];const opts=qn.o.map((o,i)=>{let cl='q-opt';if(S.qa){if(i===qn.a)cl+=' ok';else if(i===S.qs)cl+=' wrong';}else if(i===S.qs)cl+=' sel';return`<button class="${cl}" onclick="aQ(${i})" ${S.qa?'disabled':''}>${String.fromCharCode(65+i)}) ${esc(o)}</button>`;}).join('');
return`<div class="fade-in"><h2 style="margin-bottom:16px">Quizzes</h2><div class="chips">${chips}</div><div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:10px"><span style="font-size:12px;color:var(--text-secondary)">Question ${S.qi+1}/${qs.length}</span><span style="font-size:12px;color:var(--text-secondary)">Score: ${S.qsc}</span></div><div class="progress" style="margin-bottom:14px"><div class="progress-fill" style="width:${(S.qi/qs.length)*100}%"></div></div><h3 style="margin:0 0 14px;color:var(--text-primary)">${esc(qn.q)}</h3>${opts}${S.qa?`<div class="q-exp"><strong>${S.qs===qn.a?'Correct!':'Incorrect.'}</strong> ${esc(qn.e)}</div><div style="text-align:right;margin-top:10px"><button class="btn btn-primary btn-sm" onclick="nQ()">Next</button></div>`:''}</div></div>`;}
function stQ(t){S.qt=t;S.qi=0;S.qsc=0;S.qtl=0;S.qd=false;S.qa=false;S.qs=-1;sqz();render();}
function aQ(i){if(S.qa)return;S.qs=i;S.qa=true;S.qtl++;if(i===Q[S.qt][S.qi].a)S.qsc++;sqz();render();}
function nQ(){const qs=Q[S.qt];S.qi++;S.qa=false;S.qs=-1;if(S.qi>=qs.length){S.qd=true;rqs(S.qt,S.qsc,S.qtl);cqz();}else sqz();render();}

function rMock(){if(S.me===-1){const p=gp();return`<div class="fade-in"><h2 style="margin-bottom:16px">Mock Exam</h2><div class="banner"><h3>Exam Simulation</h3><p>24 MCQs, timed. Covers all post-midterm topics.</p></div>${ME.map((ex,i)=>{const tk=p.ms.filter(m=>m.e===i);const b=tk.length?Math.max(...tk.map(m=>Math.round(m.s/m.t*100))):null;return`<div class="card" style="cursor:pointer" onclick="stM(${i})"><h3 style="margin:0">Mock Exam ${i+1}</h3><p style="color:var(--text-secondary);margin:4px 0">${ex.length} questions</p>${b!==null?`<p>Best: <strong style="color:var(--accent)">${b}%</strong> (${tk.length} attempt${tk.length>1?'s':''})</p>`:'<p style="color:var(--text-tertiary)">Not attempted</p>'}<button class="btn btn-primary btn-sm" style="margin-top:8px">Start</button></div>`;}).join('')}</div>`;}
const ex=ME[S.me];
if(S.md){const sc=S.ma.reduce((s,a,i)=>s+(a===ex[i].a?1:0),0);const pc=Math.round(sc/ex.length*100);const bd={};ex.forEach((q,i)=>{if(!bd[q.t])bd[q.t]={c:0,t:0};bd[q.t].t++;if(S.ma[i]===q.a)bd[q.t].c++;});
let bh='';Object.entries(bd).forEach(([tid,v])=>{const tn=T.find(t=>t.id===tid)?.f||tid;const p2=Math.round(v.c/v.t*100);const c=p2>=80?'var(--green)':p2>=50?'var(--amber)':'var(--red)';bh+=`<div class="mastery-row"><span class="mastery-label">${tn}</span><div class="mastery-bar"><div class="progress"><div class="progress-fill" style="width:${p2}%;background:${c}"></div></div></div><span class="mastery-pct" style="color:${c}">${v.c}/${v.t}</span></div>`;});
let rv='';ex.forEach((q,i)=>{const ok=S.ma[i]===q.a;rv+=`<div style="padding:10px 0;border-bottom:1px solid var(--border)"><p style="font-weight:600;font-size:13.5px;${ok?'':'color:var(--red)'}">${i+1}. ${esc(q.q)}</p><p style="font-size:12.5px;margin-top:3px;color:var(--text-secondary)">Yours: <strong>${esc(q.o[S.ma[i]]||'—')}</strong> ${ok?'✓':'✗ → '+esc(q.o[q.a])}</p></div>`;});
return`<div class="fade-in"><h2>Exam Complete</h2><div class="card"><div class="q-score">${pc}%</div><div class="q-score-sub">${sc}/${ex.length} correct</div></div><div class="card"><h3 style="margin:0 0 8px">Breakdown</h3>${bh}</div><div class="card"><h3 style="margin:0 0 8px">Review</h3>${rv}</div><div style="text-align:center;margin-top:16px"><button class="btn btn-primary" onclick="S.me=-1;S.md=false;render()">Back</button></div></div>`;}
const el=Math.floor((Date.now()-S.mt)/1000);const mm=Math.floor(el/60),ss=el%60;const ts=`${mm}:${ss<10?'0':''}${ss}`;const tc=mm>=55?'crit':mm>=45?'warn':'';const qn=ex[S.mi];
const opts=qn.o.map((o,i)=>{let cl='q-opt';if(S.ma[S.mi]===i)cl+=' sel';return`<button class="${cl}" onclick="S.ma[${S.mi}]=${i};render()">${String.fromCharCode(65+i)}) ${esc(o)}</button>`;}).join('');
const dots=ex.map((_,i)=>{const a=S.ma[i];const bg=i===S.mi?'var(--accent)':a!==undefined?'var(--green)':'var(--bg-input)';return`<span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${bg};cursor:pointer;margin:2px" onclick="S.mi=${i};render()"></span>`;}).join('');
return`<div class="fade-in"><div class="timer-bar"><span style="font-size:13px;color:var(--text-secondary)">Q${S.mi+1}/${ex.length}</span><span class="timer-time ${tc}">${ts}</span><button class="btn btn-danger btn-sm" onclick="fM()">Finish</button></div><div class="card"><h3 style="margin:0 0 14px;color:var(--text-primary)">${esc(qn.q)}</h3>${opts}<div style="display:flex;justify-content:space-between;margin-top:14px"><button class="btn btn-ghost btn-sm" onclick="mN(-1)" ${S.mi===0?'disabled':''}>Prev</button><button class="btn btn-primary btn-sm" onclick="mN(1)">${S.mi===ex.length-1?'Finish':'Next'}</button></div></div><div style="text-align:center;margin-top:10px">${dots}</div></div>`;}
function stM(i){S.me=i;S.mi=0;S.ma=[];S.md=false;S.mt=Date.now();if(S.mti)clearInterval(S.mti);S.mti=setInterval(()=>{const e=document.querySelector('.timer-time');if(!e)return;const s=Math.floor((Date.now()-S.mt)/1000);const m=Math.floor(s/60),r=s%60;e.textContent=`${m}:${r<10?'0':''}${r}`;e.className='timer-time'+(m>=55?' crit':m>=45?' warn':'');},1000);render();}
function mN(d){const ex=ME[S.me];if(d===1&&S.mi===ex.length-1){fM();return;}S.mi=Math.max(0,Math.min(ex.length-1,S.mi+d));render();}
function fM(){if(S.mti){clearInterval(S.mti);S.mti=null;}S.md=true;const ex=ME[S.me];const sc=S.ma.reduce((s,a,i)=>s+(a===ex[i].a?1:0),0);const bd={};ex.forEach((q,i)=>{if(!bd[q.t])bd[q.t]={c:0,t:0};bd[q.t].t++;if(S.ma[i]===q.a)bd[q.t].c++;});rms(S.me,sc,ex.length,bd);render();}

(function(){const s=localStorage.getItem('mse446t');if(s){document.documentElement.dataset.theme=s;document.getElementById('themeBtn').textContent=s==='dark'?'\u263E':'\u2600';}us();navigate('dashboard');})();
</script>
</body>
</html>
